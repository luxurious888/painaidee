<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไปไหนดี - Painaidee</title>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBHY6nSriufUS2NKndb88lKnNEvAJ2-ukc&libraries=places"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        
        body { font-family: 'Kanit', sans-serif; margin: 0; background-color: #f7f9fc; padding-bottom: 70px; }
        
        /* Navigation Bar ด้านบน */
        nav { display: flex; justify-content: space-around; background: white; padding: 15px 0; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 2000; }
        nav div { cursor: pointer; font-weight: 600; color: #666; transition: 0.3s; padding: 5px 15px; border-radius: 20px; }
        nav div.active { color: #00b900; background: #e8f5e9; }

        header { background: #00b900; color: white; padding: 20px; text-align: center; }
        .page { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .page.active { display: block; }

        #map { width: 100%; height: 300px; border-bottom: 3px solid #00b900; }

        /* ฟอร์มเจ้าของร้าน */
        .form-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-family: 'Kanit'; font-size: 16px; }
        
        .btn { width: 100%; padding: 15px; background: #00b900; color: white; border: none; border-radius: 30px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #009800; transform: translateY(-2px); }

        /* รายการร้าน */
        .place-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-info { padding: 15px; }

        #payment-area { display: none; text-align: center; margin-top: 25px; border-top: 2px dashed #eee; padding-top: 20px; }
        #qr-img { width: 220px; margin-bottom: 15px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<nav>
    <div id="tab-home" class="active" onclick="switchPage('home')">🏠 ค้นหาร้าน</div>
    <div id="tab-partner" onclick="switchPage('partner')">📢 สำหรับเจ้าของร้าน</div>
</nav>

<div id="page-home" class="page active">
    <header style="border-radius: 15px; margin-bottom: 20px;">
        <h2>ไปไหนดี? (Painaidee)</h2>
        <p>ค้นหาร้านกิน-ดื่ม ในอุบลราชธานี</p>
    </header>
    <div id="map" style="border-radius: 15px;"></div>
    <input type="text" id="search" placeholder="🔍 พิมพ์ชื่อร้าน..." style="margin-top:20px; border-radius: 25px; padding:15px; border: 1px solid #ddd; width:100%; box-sizing: border-box;">
    <div id="placeList" class="place-list"></div>
</div>

<div id="page-partner" class="page">
    <div class="form-card">
        <h2 style="color:#00b900; margin-top:0;">ระบบจัดการเจ้าของร้าน</h2>
        <p>อัปเดตโปรโมชั่นหรือซื้อโฆษณาด้วยระบบอัตโนมัติ</p>
        <hr>

        <div class="input-group">
            <label>1. เลือกแพ็กเกจ</label>
            <select id="package" onchange="updatePrice()">
                <option value="50">อัปเดตโปรโมชั่น (50 บาท)</option>
                <option value="300">โฆษณา Top 10 รายเดือน (300 บาท)</option>
            </select>
        </div>

        <div class="input-group">
            <label>2. ระบุชื่อร้านของคุณ</label>
            <input type="text" id="shopName" placeholder="เช่น ร้านส้มตำแม่บุญธรรม">
        </div>

        <div class="input-group">
            <label>3. รายละเอียดโปรโมชั่น</label>
            <textarea id="promoDesc" rows="3" placeholder="ระบุข้อความที่จะแสดงบนหน้าแอป..."></textarea>
        </div>

        <button class="btn" onclick="showPayment()">ขั้นตอนถัดไป: ชำระเงิน</button>

        <div id="payment-area">
            <h4>สแกนเพื่อจ่ายเงิน <span id="price-tag">50</span> บาท</h4>
            <img id="qr-img" src="" alt="QR Code">
            <p style="font-size:14px; color:#666;">โอนเงินเข้าบัญชีพร้อมเพย์แอดมิน</p>
            
            <div class="input-group" style="text-align:left;">
                <label>4. อัปโหลดสลิปเพื่อตรวจสอบ (Auto Check)</label>
                <input type="file" id="slipFile" accept="image/*">
            </div>
            <button class="btn" style="background:#333;" onclick="verifyPayment()">ยืนยันการโอนเงิน</button>
        </div>
    </div>
</div>

<script>
    let map;
    let service;
    let allPlaces = [];

    // ระบบสลับหน้า
    function switchPage(pageName) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav div').forEach(t => t.classList.remove('active'));
        
        document.getElementById('page-' + pageName).classList.add('active');
        document.getElementById('tab-' + pageName).classList.add('active');
        
        if(pageName === 'home') initMap(); // โหลดแผนที่ใหม่เมื่อกลับหน้าโฮม
    }

    function updatePrice() {
        document.getElementById('price-tag').innerText = document.getElementById('package').value;
    }

    function showPayment() {
        const amt = document.getElementById('package').value;
        const myPromptPay = "0812345678"; // <--- เปลี่ยนเป็นเบอร์พร้อมเพย์ของคุณ
        document.getElementById('qr-img').src = `https://promptpay.io/${myPromptPay}/${amt}.png`;
        document.getElementById('payment-area').style.display = 'block';
    }

    function verifyPayment() {
        const file = document.getElementById('slipFile').files[0];
        if(!file) { alert('กรุณาอัปโหลดรูปสลิปก่อนครับ'); return; }
        alert('กำลังตรวจสอบสลิปอัตโนมัติ... กรุณารอสักครู่');
        // ส่วนนี้รอเชื่อมต่อ API SlipOk หรือ EasySlip ในขั้นตอนถัดไป
    }

    // Google Maps Logic (เหมือนเดิม)
    function initMap() {
        const ubon = { lat: 15.2287, lng: 104.8564 };
        map = new google.maps.Map(document.getElementById("map"), { center: ubon, zoom: 15 });
        service = new google.maps.places.PlacesService(map);
        service.nearbySearch({ location: ubon, radius: '3000', type: ['restaurant', 'bar'] }, (results) => {
            allPlaces = results;
            renderPlaces(results);
        });
    }

    function renderPlaces(places) {
        const list = document.getElementById('placeList');
        list.innerHTML = places.map(p => `
            <div class="card">
                <img src="${p.photos ? p.photos[0].getUrl() : 'https://via.placeholder.com/300x160'}" alt="${p.name}">
                <div class="card-info">
                    <h3>${p.name}</h3>
                    <p>⭐ ${p.rating || 'N/A'} | 📍 ${p.vicinity}</p>
                </div>
            </div>
        `).join('');
    }

    window.onload = initMap;
</script>

</body>
</html>
