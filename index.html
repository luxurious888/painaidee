<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไปไหนดี - Painaidee VIP Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        
        :root {
            --primary: #C5A059; --primary-light: #DFBF8B; --dark: #121418; --surface: #1A1D23;
            --text-gold: #C5A059; --text-muted: #999999; --danger: #D9534F; --vip-gold: linear-gradient(135deg, #FFD700, #C5A059);
            --line-color: #06C755; --fb-color: #1877F2; --border: rgba(197, 160, 89, 0.2);
        }

        body { font-family: 'Kanit', sans-serif; margin: 0; background-color: var(--dark); color: #FFF; padding-bottom: 60px; overflow-x: hidden; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-around; background: var(--surface); padding: 5px 0; position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid var(--border); }
        nav div { cursor: pointer; color: var(--text-muted); padding: 15px; transition: 0.3s; font-size: 14px; }
        nav div.active { color: var(--primary); font-weight: 600; border-bottom: 3px solid var(--primary); }

        /* Header & Logout */
        header { background: var(--dark); padding: 30px 20px; text-align: center; position: relative; border-bottom: 1px solid var(--border); }
        .logout-btn { position: absolute; top: 15px; right: 15px; background: rgba(217, 83, 79, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { background: var(--danger); color: white; }

        /* General UI Elements */
        .page { display: none; padding: 15px; max-width: 900px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #map { width: 100%; height: 300px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: var(--primary-light); font-family: 'Kanit'; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(197, 160, 89, 0.4); }

        /* 👑 VIP & Regular Cards */
        .place-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .place-card { background: var(--surface); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); position: relative; transition: 0.3s; display: flex; flex-direction: column; }
        
        /* VIP Styling */
        .card-vip { border: 2px solid #FFD700 !important; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .vip-badge { position: absolute; top: 10px; left: 10px; background: var(--vip-gold); color: #000; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; z-index: 10; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .place-card img { width: 100%; height: 180px; object-fit: cover; }
        .place-info { padding: 15px; flex-grow: 1; }
        .status-tag { padding: 3px 8px; border-radius: 10px; font-size: 11px; white-space: nowrap; }

        .action-buttons { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .btn-sm { flex: 1; padding: 8px; border-radius: 8px; font-size: 12px; text-align: center; text-decoration: none; cursor: pointer; border: 1px solid var(--border); color: #FFF; background: var(--dark); font-family: 'Kanit'; }
        
        /* VIP Specific Buttons */
        .btn-vip-line { background: var(--line-color); color: white; border: none; }
        .btn-vip-fb { background: var(--fb-color); color: white; border: none; }

        #loginOverlay { position: fixed; inset: 0; background: rgba(18, 20, 24, 0.98); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .login-card { background: var(--surface); padding: 40px; border-radius: 24px; text-align: center; border: 1px solid var(--border); max-width: 320px; }
        .btn-line-login { background: #06C755; color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<div id="loginOverlay" style="display: none;">
    <div class="login-card">
        <h2 style="color:var(--primary);">PAINAIDEE</h2>
        <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 25px;">เข้าสู่ระบบเพื่อค้นหาพิกัดที่ดีที่สุด</p>
        <button class="btn-line-login" onclick="liff.login()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" width="20"> เข้าสู่ระบบด้วย LINE
        </button>
    </div>
</div>

<div id="appContent" style="display: none;">
    <nav>
        <div id="tab-home" class="active" onclick="switchPage('home')">🏠 หน้าแรก</div>
        <div id="tab-partner" onclick="switchPage('partner')">🤝 สำหรับร้านค้า</div>
    </nav>

    <div id="page-home" class="page active">
        <header>
            <button class="logout-btn" onclick="logout()">🚪 ออกจากระบบ</button>
            <div id="user-profile"></div>
        </header>
        
        <div id="map"></div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <select id="provinceSelect" onchange="changeLocation()" style="flex:1;">
                <option value="current">📍 พิกัดปัจจุบัน</option>
                <option value="ubon" selected>อุบลราชธานี</option>
                <option value="bkk">กรุงเทพฯ</option>
            </select>
            <select id="categorySelect" onchange="executeSearch()" style="flex:1;">
                <option value="ร้านอาหาร">ทั้งหมด</option>
                <option value="คาเฟ่">คาเฟ่</option>
                <option value="บาร์">บาร์ / ผับ</option>
            </select>
        </div>

        <div id="placeList" class="place-grid"></div>
    </div>

    <div id="page-partner" class="page">
        <div style="background: var(--surface); padding: 20px; border-radius: 16px; border: 1px solid var(--border);">
            <h3 style="color:var(--primary); margin-top:0;">อัปเดตข้อมูลร้านค้า (VIP)</h3>
            <p style="font-size: 12px; color:var(--text-muted);">*เฉพาะร้านที่เป็น VIP เท่านั้นที่สามารถกรอกลิงก์โซเชียลได้</p>
            
            <input type="password" id="vipPinInput" placeholder="กรอก Store PIN ของคุณ">
            <textarea id="vipPromoDetail" placeholder="รายละเอียดโปรโมชันเด็ดๆ..."></textarea>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="vipLineLink" placeholder="ลิงก์ LINE OA (https://...)">
                <input type="text" id="vipFbLink" placeholder="ลิงก์ Facebook Page">
            </div>
            
            <button class="btn-primary" onclick="submitVipData()">บันทึกและอัปเดตโปรโมชั่น</button>
        </div>
    </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    // 💡 1. ฐานข้อมูลและตั้งค่า
    const myLiffId = "2009598846-wiCUeV35";
    let appData = JSON.parse(localStorage.getItem('painaidee_pro')) || { 
        registeredStores: [
            { name: "Lan'suk ลานสุข อุบล", pin: "1234", isVIP: true, line: "https://line.me/R/ti/p/@lansuk", fb: "https://www.facebook.com/lansukubon", promo: "VIP ลด 10% ทันที!" }
        ],
        blacklisted: [] 
    };

    function save() { localStorage.setItem('painaidee_pro', JSON.stringify(appData)); renderPlaces(); }

    // 💡 2. LINE LIFF & Profile
    async function initLiff() {
        try {
            await liff.init({ liffId: myLiffId });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('appContent').style.display = 'block';
                document.getElementById('user-profile').innerHTML = `
                    <img src="${profile.pictureUrl}" style="width:70px; border-radius:50%; border:2px solid var(--primary);">
                    <h2 style="margin:10px 0 5px; color:var(--primary);">สวัสดี, คุณ ${profile.displayName}</h2>
                    <p style="font-size:13px; margin:0;">ไม่ว่าจะอยู่ส่วนไหนบนโลกนี้ ก็ไม่เหงาอีกต่อไป</p>
                `;
                initMap();
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
            }
        } catch (e) { console.error(e); }
    }

    function logout() { liff.logout(); window.location.reload(); }

    // 💡 3. ระบบแผนที่และการจัดลำดับ VIP
    let map, service, infoWindow, currentCoords = { lat: 15.2287, lng: 104.8564 }, markers = [];

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), { center: currentCoords, zoom: 14, styles: darkMapStyle });
        service = new google.maps.places.PlacesService(map);
        infoWindow = new google.maps.InfoWindow();
        executeSearch();
    }

    function executeSearch() {
        const keyword = document.getElementById('categorySelect').value;
        service.nearbySearch({ location: currentCoords, radius: 5000, keyword: keyword }, (results, status) => {
            if (status === google.maps.places.PlacesServiceStatus.OK) {
                renderPlaces(results);
            }
        });
    }

    function renderPlaces(results = []) {
        const list = document.getElementById('placeList');
        if (!results.length) return;

        // 🚀 VIP Priority Sort Logic
        const sorted = results.map(p => {
            const vipData = appData.registeredStores.find(s => s.name === p.name);
            return { ...p, vipInfo: vipData };
        }).sort((a, b) => (b.vipInfo?.isVIP || false) - (a.vipInfo?.isVIP || false));

        list.innerHTML = sorted.map(p => {
            const isVIP = p.vipInfo?.isVIP || false;
            const img = p.photos ? p.photos[0].getUrl() : 'https://via.placeholder.com/400x200';
            
            return `
                <div class="place-card ${isVIP ? 'card-vip' : ''}">
                    ${isVIP ? '<div class="vip-badge">👑 VIP RECOMMEND</div>' : ''}
                    <img src="${img}">
                    <div class="place-info">
                        <h3 style="margin:0; color:${isVIP ? '#FFD700' : 'var(--primary)'};">${p.name}</h3>
                        <p style="font-size:12px; color:var(--text-muted);">${p.vicinity}</p>
                        ${isVIP ? `<p style="color:#FFF; background:rgba(197,160,89,0.2); padding:5px; border-radius:5px; font-size:13px;">🔥 ${p.vipInfo.promo}</p>` : ''}
                        
                        <div class="action-buttons">
                            <button class="btn-sm" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${p.geometry.location.lat()},${p.geometry.location.lng()}')">นำทาง</button>
                            ${isVIP && p.vipInfo.line ? `<button class="btn-sm btn-vip-line" onclick="window.open('${p.vipInfo.line}')">ทัก LINE</button>` : ''}
                            ${isVIP && p.vipInfo.fb ? `<button class="btn-sm btn-vip-fb" onclick="window.open('${p.vipInfo.fb}')">Facebook</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 💡 4. ระบบงาน VIP (Partner)
    function submitVipData() {
        const pin = document.getElementById('vipPinInput').value;
        const store = appData.registeredStores.find(s => s.pin === pin);
        
        if (!store || !store.isVIP) return alert("❌ สงวนสิทธิ์สำหรับรหัส VIP เท่านั้น");
        
        store.line = document.getElementById('vipLineLink').value;
        store.fb = document.getElementById('vipFbLink').value;
        store.promo = document.getElementById('vipPromoDetail').value;
        
        save();
        alert("✅ อัปเดตข้อมูล VIP เรียบร้อยแล้ว!");
        switchPage('home');
    }

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('nav div').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('tab-' + p).classList.add('active');
    }

    function changeLocation() { /* ... Logic เดิม ... */ executeSearch(); }

    const darkMapStyle = [ { "elementType": "geometry", "stylers": [ { "color": "#212121" } ] }, { "elementType": "labels.text.fill", "stylers": [ { "color": "#757575" } ] } ];

    window.onload = initLiff;
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7Qqf1Z9KQBuvipDzgIc5laJLz9SiOBH8&libraries=places&callback=initMap" async defer></script>
</body>
</html>
