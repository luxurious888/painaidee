<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไปไหนดี - Painaidee Super App</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        
        :root {
            --primary: #C5A059; --primary-light: #DFBF8B; --dark: #121418; --surface: #1A1D23;
            --text-gold: #C5A059; --text-muted: #999999; --danger: #D9534F; 
            --vip-gold: linear-gradient(135deg, #FFD700, #C5A059, #FFD700);
            --line-green: #06C755; --fb-blue: #1877F2; --border: rgba(197, 160, 89, 0.2);
        }

        body { font-family: 'Kanit', sans-serif; margin: 0; background-color: var(--dark); color: #FFF; padding-bottom: 60px; }
        
        /* Nav & Header */
        nav { display: flex; justify-content: space-around; background: var(--surface); position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid var(--border); }
        nav div { cursor: pointer; color: var(--text-muted); padding: 15px; transition: 0.3; font-size: 14px; }
        nav div.active { color: var(--primary); font-weight: 600; border-bottom: 3px solid var(--primary); }

        header { background: var(--dark); padding: 30px 20px; text-align: center; position: relative; border-bottom: 1px solid var(--border); }
        .logout-btn { position: absolute; top: 15px; right: 15px; background: rgba(217, 83, 79, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .logout-btn:hover { background: var(--danger); color: white; }

        /* Forms */
        .page { display: none; padding: 15px; max-width: 900px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: var(--primary-light); font-family: 'Kanit'; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 10px; border-radius: 8px; cursor: pointer; font-family: 'Kanit'; }

        /* 👑 VIP & Card Design */
        #map { width: 100%; height: 300px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .place-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .place-card { background: var(--surface); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); position: relative; transition: 0.3s; display: flex; flex-direction: column; }
        
        .card-vip { border: 2px solid #FFD700 !important; box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }
        .vip-crown { position: absolute; top: -5px; left: -5px; background: var(--vip-gold); color: #000; padding: 5px 12px; border-radius: 0 0 15px 0; font-size: 12px; font-weight: 800; z-index: 10; box-shadow: 3px 3px 10px rgba(0,0,0,0.5); }
        
        .place-card img { width: 100%; height: 180px; object-fit: cover; }
        .place-info { padding: 15px; flex-grow: 1; }
        
        .action-bar { display: flex; gap: 8px; margin-top: 10px; }
        .btn-act { flex: 1; padding: 8px; border-radius: 8px; font-size: 12px; text-align: center; text-decoration: none; font-family: 'Kanit'; cursor: pointer; border: 1px solid var(--border); color: #FFF; background: var(--dark); }
        .btn-line { background: var(--line-green); border: none; }
        .btn-fb { background: var(--fb-blue); border: none; }

        /* Login Overlay */
        #loginOverlay { position: fixed; inset: 0; background: rgba(12,14,18,0.98); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .login-card { background: var(--surface); padding: 40px; border-radius: 24px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="loginOverlay" style="display: none;">
    <div class="login-card">
        <h2 style="color:var(--primary); margin:0;">PAINAIDEE</h2>
        <p style="color:var(--text-muted); font-size:14px; margin-bottom:30px;">ไม่ว่าจะอยู่ส่วนไหนบนโลกนี้ ก็ไม่เหงาอีกต่อไป</p>
        <button onclick="liff.login()" style="background:#06C755; color:#FFF; border:none; padding:15px; width:100%; border-radius:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" width="20"> ล็อคอินด้วย LINE
        </button>
    </div>
</div>

<div id="appContent" style="display: none;">
    <nav>
        <div id="tab-home" class="active" onclick="switchPage('home')">🏠 หน้าแรก</div>
        <div id="tab-partner" onclick="switchPage('partner')">🤝 พาร์ทเนอร์</div>
    </nav>

    <div id="page-home" class="page active">
        <header>
            <button class="logout-btn" onclick="logout()">🚪 ออกจากระบบ</button>
            <div id="user-profile"></div>
        </header>
        <div id="map"></div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="provinceSelect" onchange="changeLocation()" style="flex:1;"><option value="current">📍 พิกัดปัจจุบัน</option><option value="ubon" selected>อุบลราชธานี</option></select>
            <select id="categorySelect" onchange="executeSearch()" style="flex:1;"><option value="ร้านอาหาร">ร้านอาหาร</option><option value="คาเฟ่">คาเฟ่</option><option value="บาร์">ผับ / บาร์</option></select>
        </div>
        <div id="placeList" class="place-grid"></div>
    </div>

    <div id="page-partner" class="page">
        <div style="background:var(--surface); padding:20px; border-radius:16px; border:1px solid var(--border); margin-bottom:20px;">
            <h3 style="color:var(--primary); margin-top:0;">1. ลงทะเบียนร้านค้าใหม่</h3>
            <input type="text" id="regStoreName" placeholder="ชื่อร้านค้า...">
            <button class="btn-outline" onclick="searchRegStore()" style="margin-bottom:10px;">🔎 ตรวจสอบพิกัดในแผนที่</button>
            <div id="regStoreVerifyCard" style="display:none; margin-bottom:10px;">
                <div id="regMiniMap" style="width:100%; height:150px; border-radius:10px;"></div>
            </div>
            <label style="font-size:12px; color:var(--text-muted);">อัปโหลดรูปหน้าร้าน/บัตรประชาชน:</label>
            <input type="file" id="regFiles" multiple>
            <button class="btn-primary" onclick="submitStoreRegistration()">ส่งข้อมูลลงทะเบียน</button>
        </div>

        <div style="background:var(--surface); padding:20px; border-radius:16px; border:1px solid var(--border);">
            <h3 style="color:var(--primary); margin-top:0;">2. จัดการข้อมูลร้านค้า & โปรโมชั่น</h3>
            <input type="password" id="storePinInput" placeholder="รหัส PIN ร้านค้า..." onchange="checkVipStatus()">
            <textarea id="promoDetail" placeholder="รายละเอียดโปรโมชั่น..."></textarea>
            
            <div id="vipOnlyFields" style="display:none; border: 1px dashed var(--primary); padding:15px; border-radius:10px; margin-bottom:15px;">
                <h4 style="color:#FFD700; margin-top:0;">👑 สิทธิ์ VIP: เพิ่มช่องทางติดต่อ</h4>
                <input type="text" id="vipLine" placeholder="ลิงก์ LINE OA (https://...)">
                <input type="text" id="vipFb" placeholder="ลิงก์ Facebook Page (https://...)">
            </div>

            <button class="btn-primary" onclick="submitPromo()">อัปเดตข้อมูล</button>
        </div>
    </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    // 💡 ข้อมูลระบบ
    const myLiffId = "2009598846-wiCUeV35";
    let appData = JSON.parse(localStorage.getItem('painaidee_super')) || { 
        stores: [{ name: "Lan'suk ลานสุข อุบล", pin: "1234", isVIP: true, line: "https://line.me/R/ti/p/@lansuk", fb: "https://www.facebook.com/lansukubon", promo: "VIP ลด 10%!" }],
        requests: [] 
    };

    function save() { localStorage.setItem('painaidee_super', JSON.stringify(appData)); renderPlaces(); }

    // 💡 LINE Login
    async function initLiff() {
        try {
            await liff.init({ liffId: myLiffId });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('appContent').style.display = 'block';
                document.getElementById('user-profile').innerHTML = `
                    <img src="${profile.pictureUrl}" style="width:70px; border-radius:50%; border:2px solid var(--primary);">
                    <h2 style="margin:10px 0 5px; color:var(--primary);">สวัสดี, คุณ ${profile.displayName}</h2>
                    <p style="font-size:13px; margin:0;">ไม่ว่าจะอยู่ส่วนไหนบนโลกนี้ ก็ไม่เหงาอีกต่อไป</p>
                `;
                initMap();
            } else { document.getElementById('loginOverlay').style.display = 'flex'; }
        } catch (e) { console.error(e); }
    }
    function logout() { liff.logout(); window.location.reload(); }

    // 💡 แผนที่ & VIP Sorting
    let map, service, currentCoords = { lat: 15.2287, lng: 104.8564 };

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), { center: currentCoords, zoom: 14 });
        service = new google.maps.places.PlacesService(map);
        executeSearch();
    }

    function executeSearch() {
        const kw = document.getElementById('categorySelect').value;
        service.nearbySearch({ location: currentCoords, radius: 5000, keyword: kw }, (results, status) => {
            if (status === google.maps.places.PlacesServiceStatus.OK) { renderPlaces(results); }
        });
    }

    function renderPlaces(results = []) {
        const list = document.getElementById('placeList');
        // Sort: VIP First
        const sorted = results.map(p => {
            const v = appData.stores.find(s => s.name === p.name);
            return { ...p, vip: v };
        }).sort((a,b) => (b.vip?.isVIP || 0) - (a.vip?.isVIP || 0));

        list.innerHTML = sorted.map(p => {
            const isV = p.vip?.isVIP || false;
            const img = p.photos ? p.photos[0].getUrl() : 'https://via.placeholder.com/400x200';
            return `
                <div class="place-card ${isV ? 'card-vip' : ''}">
                    ${isV ? '<div class="vip-crown">👑 VIP</div>' : ''}
                    <img src="${img}">
                    <div class="place-info">
                        <h3 style="margin:0; color:${isV ? '#FFD700' : 'var(--primary)'};">${p.name}</h3>
                        <p style="font-size:12px; color:var(--text-muted); margin:5px 0;">📍 ${p.vicinity}</p>
                        ${isV ? `<p style="color:#FFF; background:rgba(197,160,89,0.2); padding:5px; border-radius:5px; font-size:13px;">📣 ${p.vip.promo}</p>` : ''}
                        <div class="action-bar">
                            <button class="btn-act" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${p.geometry.location.lat()},${p.geometry.location.lng()}')">นำทาง</button>
                            ${isV && p.vip.line ? `<button class="btn-act btn-line" onclick="window.open('${p.vip.line}')">LINE</button>` : ''}
                            ${isV && p.vip.fb ? `<button class="btn-act btn-fb" onclick="window.open('${p.vip.fb}')">Facebook</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 💡 Partner Logic
    function checkVipStatus() {
        const pin = document.getElementById('storePinInput').value;
        const store = appData.stores.find(s => s.pin === pin);
        document.getElementById('vipOnlyFields').style.display = (store && store.isVIP) ? 'block' : 'none';
    }

    function submitPromo() {
        const pin = document.getElementById('storePinInput').value;
        const store = appData.stores.find(s => s.pin === pin);
        if(!store) return alert("❌ PIN ไม่ถูกต้อง");
        
        store.promo = document.getElementById('promoDetail').value;
        if(store.isVIP) {
            store.line = document.getElementById('vipLine').value;
            store.fb = document.getElementById('vipFb').value;
        }
        save(); alert("✅ อัปเดตข้อมูลสำเร็จ!"); switchPage('home');
    }

    // ฟังก์ชันลงทะเบียนเดิม
    function searchRegStore() { /* ... Logic ค้นหาพิกัดเดิม ... */ alert("กำลังตรวจสอบพิกัด..."); }
    function submitStoreRegistration() { alert("ส่งข้อมูลลงทะเบียนเรียบร้อย!"); }

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('nav div').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('tab-' + p).classList.add('active');
    }

    window.onload = initLiff;
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7Qqf1Z9KQBuvipDzgIc5laJLz9SiOBH8&libraries=places&callback=initMap" async defer></script>
</body>
</html>
