<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไปไหนดี - Painaidee (Full 77 Provinces)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        :root { --primary: #C5A059; --primary-light: #DFBF8B; --primary-hover: #AF8B48; --dark: #121418; --dark-light: #1A1D23; --dark-muted: #2A2E36; --bg-light: #121418; --surface: #1A1D23; --border: rgba(197, 160, 89, 0.2); --text-main: #FFFFFF; --text-gold: #C5A059; --text-muted: #999999; --danger: #D9534F; --line-green: #06C755; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background-color: var(--bg-light); padding-bottom: 50px; color: var(--text-gold); overflow-x: hidden; }
        nav { display: flex; justify-content: space-around; background: var(--surface); padding: 12px 0; position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        nav div { cursor: pointer; color: var(--text-muted); padding: 10px 20px; transition: 0.3s; font-size: 15px; border-radius: 8px; }
        nav div.active { color: var(--primary); font-weight: 600; background: rgba(197, 160, 89, 0.1); }
        header { background: var(--dark); padding: 30px 20px; text-align: center; border-radius: 0 0 24px 24px; border: 1px solid var(--border); border-top: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .page { display: none; padding: 15px; max-width: 900px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        #map { width: 100%; height: 320px; border-radius: 16px; border: 1px solid var(--border); background: #222; margin-top: 20px; }
        .search-area { background: var(--surface); padding: 25px; border-radius: 16px; margin-top: 20px; border: 1px solid var(--border); }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        select, input, textarea { padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--dark); color: var(--primary-light); width: 100%; box-sizing: border-box; outline: none; font-family: 'Kanit'; font-size: 15px; }
        .btn-primary { padding: 14px 24px; background: var(--primary); color: white; border: none; border-radius: 10px; font-family: 'Kanit'; cursor: pointer; transition: 0.3s; font-weight: 600; width: 100%; box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3); }
        .place-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-top: 24px; }
        .place-card { background: var(--surface); border-radius: 16px; overflow: hidden; border: 1px solid rgba(197,160,89,0.15); transition: 0.4s; cursor: pointer; position: relative; display: flex; flex-direction: column; }
        .vip-crown-badge { position: absolute; top: -10px; left: -10px; background: linear-gradient(135deg, #FFD700, #C5A059); color: #000; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: 800; z-index: 15; border: 2px solid #FFF; animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.5); } 50% { box-shadow: 0 0 15px rgba(255,215,0,0.9); } }
        @keyframes shine { 100% { left: 125%; } }
        .shine-effect::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%); transform: skewX(-25deg); animation: shine 3.5s infinite; pointer-events: none; }
        .promo-btn-hover:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .dashboard-card { background: var(--surface); padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 24px; }
        .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--border); padding: 10px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; display:flex; align-items:center; justify-content:center; backdrop-filter: blur(10px);">
    <div style="background:var(--surface); padding:40px; border-radius:24px; text-align:center; border:1px solid var(--border); max-width:320px;">
        <h2 style="color:#FFF;">ยินดีต้อนรับ</h2>
        <p style="color:var(--text-muted); font-size:14px; margin-bottom:30px;">กรุณาเข้าสู่ระบบเพื่อรับโปรโมชั่นพิเศษ</p>
        <button class="btn-primary" onclick="loginWithLine()" style="background:#06C755;">🟢 เข้าสู่ระบบด้วย LINE</button>
    </div>
</div>

<div id="appContent" style="display:none;">
    <nav>
        <div id="tab-home" class="active" onclick="switchPage('home')">🏠 หน้าแรก</div>
        <div id="tab-partner" onclick="switchPage('partner')">🤝 สำหรับร้านค้า</div>
    </nav>

    <div id="page-home" class="page active">
        <header>
            <div id="header-profile" style="width:80px; height:80px; border-radius:50%; background:var(--surface); border:2px solid var(--primary); margin:0 auto 15px; overflow:hidden;"></div>
            <h1 style="color:var(--primary); margin:0;">ไปไหนดี</h1>
            <p style="color:#FFF; opacity:0.8; font-size:14px;">ค้นหาร้านอาหารและสถานที่น่าสนใจทั่วไทย</p>
        </header>

        <div id="map"></div>

        <div class="search-area">
            <select id="provinceSelect" onchange="changeLocation()" style="margin-bottom:12px;"></select>
            <div class="input-row">
                <select id="foodSelect" onchange="executeSearch('food')"></select>
                <select id="beautySelect" onchange="executeSearch('beauty')"></select>
                <select id="activitySelect" onchange="executeSearch('activity')"></select>
                <select id="sportSelect" onchange="executeSearch('sport')"></select>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="searchBox" placeholder="พิมพ์ชื่อร้าน..." onkeydown="if(event.key==='Enter') executeSearch('text')">
                <button class="btn-primary" style="width:auto;" onclick="executeSearch('text')">🔍 ค้นหา</button>
            </div>
        </div>

        <div id="promoBanner" style="display:none; margin-top:30px;">
            <h3 style="color:var(--primary);">✨ Exclusive Promotions</h3>
            <div id="approvedPromoList" class="place-grid" style="margin-top:10px;"></div>
        </div>

        <div id="placeList" class="place-grid"></div>
    </div>

    <div id="page-partner" class="page">
        <div class="dashboard-card" style="border-top: 4px solid var(--primary);">
            <h3>ลงทะเบียนร้านค้าใหม่</h3>
            <div class="form-group"><label>1. ชื่อร้านค้า</label><div style="display:flex; gap:10px;"><input type="text" id="regStoreName"><button class="btn-outline" onclick="searchRegStore()">ค้นหาพิกัด</button></div></div>
            <div id="regStoreVerifyCard" style="display:none; margin-top:10px;"><div id="regMiniMap" style="width:100%; height:150px; border-radius:12px;"></div></div>
            <div class="form-group"><label>2. รูปถ่ายหน้าร้านคู่เจ้าของ</label><input type="file" id="regStorePhoto" accept="image/*"></div>
            <div class="form-group"><label>3. สำเนาบัตรประชาชน</label><input type="file" id="regIdCard" accept="image/*"></div>
            <div class="form-group"><label>4. ใบทะเบียนพาณิชย์ (ถ้ามี)</label><input type="file" id="regCommercial" accept="image/*"></div>
            <button id="btnSubmitReg" class="btn-primary" onclick="submitStoreRegistration()">🚀 ส่งข้อมูลเพื่อตรวจสอบ</button>
        </div>

        <div class="dashboard-card">
            <h3>จัดการร้านค้า / อัปเดตโปรโมชั่น</h3>
            <div class="form-group"><label>รหัสลับร้านค้า (Store PIN)</label><div style="display:flex; gap:10px;"><input type="password" id="storePinInput" placeholder="4 หลัก"><button class="btn-outline" onclick="verifyStore()">ยืนยัน</button></div></div>
            <div id="lockedFeatures" style="display:none; margin-top:20px;">
                <div id="vipUpdateSection" style="padding:15px; border:2px dashed #FFD700; border-radius:12px; margin-bottom:25px;">
                    <h4 style="color:#FFD700;">👑 ข้อมูล VIP</h4>
                    <div class="form-group"><label>ลิงก์ LINE OA ร้านค้า</label><input type="text" id="vipLineInput"></div>
                    <button class="btn-primary" style="background:var(--primary);" onclick="updateVipData()">💾 บันทึกข้อมูล VIP</button>
                </div>
                <div style="padding:20px; border:2px solid var(--primary); border-radius:16px; background:linear-gradient(180deg, rgba(197,160,89,0.15), var(--surface)); position:relative; overflow:hidden;">
                    <h4 style="text-align:center; color:var(--primary);">🚀 ดันยอดขายพุ่ง! พื้นที่โปรโมทหน้าแรก</h4>
                    <div class="form-group"><label>📍 เลือกจังหวัดที่จะโปรโมท</label><select id="promoProvinceSelect"></select></div>
                    <div class="form-group"><label>🏷️ หมวดหมู่</label><select id="promoStoreCategory"></select></div>
                    <div class="form-group"><label>💎 แพ็กเกจ</label><select id="promoServiceSelect"></select></div>
                    <div class="form-group"><label>🖼️ รูปแบนเนอร์ (3:2)</label><input type="file" id="promoImageInput" accept="image/*"></div>
                    <div class="form-group"><label>📝 ข้อความดึงดูดลูกค้า</label><textarea id="promoDetail" rows="3"></textarea></div>
                    <button id="btnSubmitPromo" class="btn-primary" style="background:linear-gradient(135deg, #FFD700, #C5A059); color:#000;" onclick="submitPromoWithPIN()">🚀 สั่งซื้อและส่งข้อมูล</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

        {id:'phetchabun',name:'เพชรบูรณ์',lat:16.4184,lng:101.1554},{id:'phrae',name:'แพร่',lat:18.1446,lng:100.1403},{id:'phuket',name:'ภูเก็ต',lat:7.9519,lng:98.3381},

        {id:'uthaithani',name:'อุทัยธานี',lat:15.3730,lng:100.0243},{id:'ubon',name:'อุบลราชธานี',lat:15.2287,lng:104.8564}

    async function loadFromCloud() {
        try { const res = await fetch(API_URL); const data = await res.json(); if(data && data.registeredStores) appData = data; renderUI(); } catch(e) { console.error(e); }
    }
    async function saveToCloud() { try { await fetch(API_URL, { method:'POST', body:JSON.stringify(appData) }); } catch(e) { console.error(e); } }

    const resizeImg = (file) => new Promise(resolve => {
        if(!file) return resolve('');
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = e => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 800; canvas.height = (img.height/img.width)*800;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.6));
            };
        };
    });

    async function initializeLiff() {
        try {
            await liff.init({ liffId: "2009598846-wiCUeV35" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                document.getElementById('header-profile').innerHTML = `<img src="${profile.pictureUrl}" style="width:100%; height:100%; object-fit:cover;">`;
                await loadFromCloud();
                initMap();
            }
        } catch (err) { console.error(err); }
    }

    function loginWithLine() { liff.login({ redirectUri: window.location.href }); }
    function switchPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); document.querySelectorAll('nav div').forEach(el => el.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); document.getElementById('tab-'+p).classList.add('active'); }

    let map, service, infoWindow, currentCoords = { lat: 15.22, lng: 104.85 }, googlePlaces = [], currentPagination = null;

    function initMap() {
        const pSel = document.getElementById('provinceSelect'), prSel = document.getElementById('promoProvinceSelect');
        pSel.innerHTML = '<option value="current">📍 ตำแหน่งปัจจุบัน</option>';
        provinces.sort((a,b) => a.name.localeCompare(b.name, 'th')).forEach(p => { 
            pSel.appendChild(new Option(p.name, p.id)); prSel.appendChild(new Option(p.name, p.id)); 
        });
        pSel.value = 'ubon';
        map = new google.maps.Map(document.getElementById("map"), { center: currentCoords, zoom: 14, mapTypeControl: false, streetViewControl: false });
        service = new google.maps.places.PlacesService(map);
        infoWindow = new google.maps.InfoWindow();
        executeSearch();
    }

    function changeLocation() {
        const val = document.getElementById('provinceSelect').value;
        if(val === 'current') {
            navigator.geolocation.getCurrentPosition(pos => {
                currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                map.setCenter(currentCoords); executeSearch();
            });
        } else {
            const sel = provinces.find(p => p.id === val);
            if(sel) { currentCoords = { lat: sel.lat, lng: sel.lng }; map.setCenter(currentCoords); executeSearch(); }
        }
    }

    function executeSearch(type) {
        let kw = "ร้านอาหาร";
        if(type==='text') kw = document.getElementById('searchBox').value;
        else if(type && document.getElementById(type+'Select')) kw = document.getElementById(type+'Select').value;
        service.nearbySearch({ location: currentCoords, radius: 5000, keyword: kw }, (res, status, pag) => {
            if(status === "OK") {
                googlePlaces = res.filter(p => !appData.blacklistedPlaces.includes(p.place_id));
                currentPagination = pag; renderCards();
            }
        });
    }

    function renderCards() {
        const list = document.getElementById('placeList');
        const sorted = googlePlaces.sort((a,b) => {
            const vipA = appData.registeredStores.find(s=>s.name===a.name)?.isVIP ? 1 : 0;
            const vipB = appData.registeredStores.find(s=>s.name===b.name)?.isVIP ? 1 : 0;
            return vipB - vipA;
        });
        let html = sorted.map(p => {
            const isVIP = appData.registeredStores.find(s => s.name === p.name)?.isVIP;
            return `<div class="place-card">
                ${isVIP?'<div class="vip-crown-badge">👑 VIP RECOMMENDED</div>':''}
                <img src="${p.photos?p.photos[0].getUrl({maxWidth:400}):'https://via.placeholder.com/400x200?text=Painaidee'}">
                <div style="padding:15px;">
                    <h4>${p.name}</h4>
                    <button class="btn-primary" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${p.geometry.location.lat()},${p.geometry.location.lng()}')">นำทาง</button>
                    <p style="text-align:right; margin-top:10px; font-size:10px; color:var(--danger); cursor:pointer;" onclick="reportClosed('${p.place_id}','${p.name}')">🚩 แจ้งร้านปิด</p>
                </div>
            </div>`;
        }).join('');
        if(currentPagination && currentPagination.hasNextPage) html += `<button class="btn-outline" style="width:100%;" onclick="currentPagination.nextPage()">⬇️ ดูเพิ่มเติม</button>`;
        list.innerHTML = html; renderPromos();
    }

    function renderPromos() {
        const curProv = document.getElementById('provinceSelect').value;
        const promos = appData.activePromotions.filter(p => p.province === curProv);
        const banner = document.getElementById('promoBanner');
        if(promos.length > 0) {
            banner.style.display = 'block';
            document.getElementById('approvedPromoList').innerHTML = promos.map(p => `
                <div class="place-card" style="border:2px solid var(--primary);">
                    <div class="shine-effect"></div>
                    <img src="${p.image}">
                    <div style="padding:15px;">
                        <h4 style="color:#FFD700;">✨ ${p.storeName}</h4>
                        <p style="color:#FFF; font-size:13px;">${p.detail}</p>
                        <button onclick="focusPromo('${p.storeName}')" class="btn-primary promo-btn-hover" style="background:var(--primary); color:#000; margin-top:10px; padding:10px;">📍 ดูพิกัดร้าน</button>
                    </div>
                </div>`).join('');
        } else banner.style.display = 'none';
    }

    function renderCategoriesUI() {
        ['food', 'beauty', 'activity', 'sport'].forEach(g => {
            const sel = document.getElementById(g+'Select');
            if(sel) {
                let h = `<option value="">หมวด ${g}</option>`;
                appData.categories.filter(c => c.group === g).forEach(c => h += `<option value="${c.keyword}">${c.label}</option>`);
                sel.innerHTML = h;
            }
        });
        const sSel = document.getElementById('promoServiceSelect');
        if(sSel) sSel.innerHTML = appData.services.map(s => `<option value="${s.name}">${s.name} - ${s.price}฿</option>`).join('');
    }

    function renderUI() { renderCategoriesUI(); renderPromos(); }
    function focusPromo(n) { document.getElementById('searchBox').value=n; executeSearch('text'); window.scrollTo({top:0, behavior:'smooth'}); }

    async function submitStoreRegistration() {
        const btn = document.getElementById('btnSubmitReg'); btn.innerText = "กำลังส่ง... ⏳"; btn.disabled = true;
        const photo = await resizeImg(document.getElementById('regStorePhoto').files[0]);
        const idCard = await resizeImg(document.getElementById('regIdCard').files[0]);
        const comm = await resizeImg(document.getElementById('regCommercial').files[0]);
        appData.registrationRequests.push({ id: Date.now(), storeName: document.getElementById('regStoreName').value, storePhoto: photo, idCard: idCard, commercial: comm });
        await saveToCloud(); alert("ส่งข้อมูลแล้ว! รอแอดมินแจ้ง PIN");
        btn.innerText = "🚀 ส่งข้อมูลเพื่อตรวจสอบ"; btn.disabled = false;
    }

    function verifyStore() {
        const store = appData.registeredStores.find(s => s.pin === document.getElementById('storePinInput').value);
        if(store) { document.getElementById('lockedFeatures').style.display = 'block'; alert("ยินดีต้อนรับ " + store.name); }
        else alert("PIN ไม่ถูกต้อง");
    }

    async function submitPromoWithPIN() {
        const btn = document.getElementById('btnSubmitPromo'); btn.innerText = "กำลังส่ง... ⏳"; btn.disabled = true;
        const store = appData.registeredStores.find(s => s.pin === document.getElementById('storePinInput').value);
        const img = await resizeImg(document.getElementById('promoImageInput').files[0]);
        appData.pendingPromotions.push({ id: Date.now(), storeName: store.name, province: document.getElementById('promoProvinceSelect').value, detail: document.getElementById('promoDetail').value, image: img, service: document.getElementById('promoServiceSelect').value, category: document.getElementById('promoStoreCategory').value });
        await saveToCloud(); alert("สั่งซื้อสำเร็จ! รออนุมัติครับ");
        btn.innerText = "🚀 สั่งซื้อและส่งโปรโมท"; btn.disabled = false;
    }

    function reportClosed(id, n) { if(confirm('แจ้งปิดร้าน '+n+'?')) { appData.closedReports.push({placeId:id, storeName:n, date:new Date().toLocaleString()}); saveToCloud(); alert('รับเรื่องแล้วครับ'); } }

    window.onload = initializeLiff;
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7Qqf1Z9KQBuvipDzgIc5laJLz9SiOBH8&libraries=places,geometry&callback=initMap" async defer></script>
</body>
