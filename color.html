<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าธีม & เอฟเฟกต์ - ไปไหนดี</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        
        :root { --primary: #C5A059; --dark: #121418; --surface: #1A1D23; --text: #FFFFFF; }
        body { font-family: 'Kanit', sans-serif; background-color: #0b0f19; color: var(--text); padding: 20px; margin: 0; }
        
        /* Layout หลัก แบ่ง 2 ฝั่ง */
        .layout-wrapper { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; max-width: 1200px; margin: 0 auto; padding-bottom: 50px; }
        
        /* ฝั่งซ้าย: แผงตั้งค่า */
        .container { flex: 1; min-width: 300px; max-width: 600px; background: var(--surface); padding: 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid rgba(197, 160, 89, 0.2); }
        h1 { color: var(--primary); text-align: center; margin-top: 0; border-bottom: 2px dashed var(--primary); padding-bottom: 15px; font-size: 24px; }
        
        .section-title { font-size: 16px; font-weight: 600; margin-top: 25px; margin-bottom: 15px; color: #DFBF8B; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .form-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; }
        
        label { font-size: 14px; font-weight: 500; color: #eee; }
        input[type="color"] { width: 50px; height: 50px; border: none; border-radius: 8px; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid var(--primary); border-radius: 8px; }
        
        select, input[type="file"] { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #121418; color: #FFF; font-family: 'Kanit'; width: 100%; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s; }
        select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.2); }
        
        .btn-save { background: linear-gradient(135deg, #FFD700, #C5A059); color: #000; font-size: 16px; font-weight: 600; font-family: 'Kanit'; padding: 15px; border: none; border-radius: 12px; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 20px; box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3); }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(197, 160, 89, 0.5); }
        
        .btn-reset { background: transparent; color: #aaa; font-size: 14px; font-weight: 500; font-family: 'Kanit'; padding: 12px; border: 1px solid #444; border-radius: 12px; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-reset:hover { border-color: #D9534F; color: #D9534F; background: rgba(217, 83, 79, 0.1); }
        
        /* ปุ่ม Preset Themes */
        .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-preset { padding: 10px; border-radius: 8px; border: 1px solid #444; font-family: 'Kanit'; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-preset:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .preset-aggressive { background: #050505; color: #D32F2F; border-color: #D32F2F; }
        .preset-cool { background: #0A1128; color: #00E5FF; border-color: #00E5FF; }
        .preset-luxury { background: #121418; color: #FFD700; border-color: #C5A059; }
        .preset-vibrant { background: #2D1B4E; color: #00FF87; border-color: #FF6B6B; }
        .preset-playful { background: #003B46; color: #FF4081; border-color: #18FFFF; }

        /* =========================================
           📱 ฝั่งขวา: Mockup มือถือจำลอง (Preview)
           ========================================= */
        .preview-wrapper { display: flex; flex-direction: column; align-items: center; }
        .preview-phone { width: 320px; height: 650px; background: var(--dark); border-radius: 36px; border: 8px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; display: flex; flex-direction: column; transition: background-color 0.4s ease; }
        
        /* ติ่งกล้องหน้าจอ */
        .phone-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 25px; background: #333; border-radius: 0 0 15px 15px; z-index: 100; }
        
        /* ภายในหน้าจอ */
        .mock-header { padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; }
        .mock-profile { width: 60px; height: 60px; background: #555; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; transition: 0.3s; border: 2px solid transparent; }
        .mock-app-name { font-size: 18px; font-weight: 600; color: #FFF; margin: 0; transition: color 0.3s; }
        
        .mock-body { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .mock-logo-container { width: 100px; height: 100px; display: flex; justify-content: center; align-items: center; }
        .mock-logo-img { max-width: 100%; max-height: 100%; transition: 0.3s; }
        
        .mock-card { width: 100%; height: 180px; background: rgba(255,255,255,0.05); border-radius: 16px; border: 2px solid transparent; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; position: relative; transition: 0.3s; }
        .mock-card-badge { position: absolute; top: 10px; left: -10px; background: #FFD700; color: #000; padding: 4px 12px; font-size: 10px; font-weight: bold; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .mock-card-img { width: 100%; height: 80px; background: rgba(0,0,0,0.5); border-radius: 8px; margin-bottom: 10px; margin-top: 15px; }
        .mock-card-text { width: 70%; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; margin-bottom: 8px; }
        .mock-btn { margin-top: auto; padding: 10px; border-radius: 8px; border: none; font-family: 'Kanit'; font-weight: 600; color: #FFF; transition: 0.3s; }

        /* =========================================
           ✨ ชุด CSS Animations สำหรับ Preview (ดึงไปใช้ในแอปหลักได้)
           ========================================= */
        /* 👑 VIP Effects */
        .vip-none { border-color: var(--prev-vip); }
        .vip-glow { border-color: var(--prev-vip); animation: vipGlowAnim 2s infinite alternate; }
        .vip-rainbow { animation: vipRainbowAnim 4s linear infinite; }
        .vip-float { border-color: var(--prev-vip); animation: floatAnim 3s ease-in-out infinite; }
        .vip-neon { border-color: var(--prev-vip); box-shadow: 0 0 10px var(--prev-vip), inset 0 0 10px var(--prev-vip); }
        .vip-shake { border-color: var(--prev-vip); animation: shakeAnim 4s infinite; }
        .vip-shimmer { border-color: var(--prev-vip); position: relative; overflow: hidden; }
        .vip-shimmer::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent); transform: rotate(45deg); animation: shimmerAnim 3s infinite; }

        @keyframes vipGlowAnim { 0% { box-shadow: 0 0 5px var(--prev-vip); } 100% { box-shadow: 0 0 25px var(--prev-vip); } }
        @keyframes vipRainbowAnim { 0%{border-color:#ff0000;} 20%{border-color:#ff9900;} 40%{border-color:#33cc33;} 60%{border-color:#3399ff;} 80%{border-color:#cc33cc;} 100%{border-color:#ff0000;} }
        @keyframes floatAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes shakeAnim { 0%, 100% {transform: rotate(0deg);} 10%, 30%, 50%, 70%, 90% {transform: rotate(-2deg);} 20%, 40%, 60%, 80% {transform: rotate(2deg);} }
        @keyframes shimmerAnim { 0% { left: -100%; top: -100%; } 100% { left: 100%; top: 100%; } }

        /* 🖼️ Logo Effects */
        .logo-none { }
        .logo-shine { filter: drop-shadow(0 0 10px var(--prev-primary)); animation: logoPulse 3s infinite alternate; }
        .logo-pulse { animation: logoPulseScale 1.5s infinite alternate ease-in-out; }
        .logo-spin { animation: spinAnim 8s linear infinite; }
        .logo-bounce { animation: bounceAnim 2s infinite ease-in-out; }
        .logo-float { animation: floatAnim 4s ease-in-out infinite; }

        @keyframes logoPulse { 0% { filter: drop-shadow(0 0 5px var(--prev-primary)); } 100% { filter: drop-shadow(0 0 25px var(--prev-primary)); } }
        @keyframes logoPulseScale { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes spinAnim { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes bounceAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* 👤 Profile Effects */
        .prof-none { border-color: var(--prev-primary); }
        .prof-glow-gold { border-color: #FFD700; box-shadow: 0 0 15px #FFD700; }
        .prof-rainbow-spin { border: 3px solid transparent; background-image: linear-gradient(#555, #555), linear-gradient(90deg, red, yellow, green, blue, magenta); background-origin: border-box; background-clip: content-box, border-box; animation: spinAnim 4s linear infinite; }
        .prof-pulse-ring { border-color: var(--prev-primary); animation: pulseRing 2s infinite; }
        .prof-float { border-color: var(--prev-primary); animation: floatAnim 3s ease-in-out infinite; }

        @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.7); } 100% { box-shadow: 0 0 0 15px rgba(197, 160, 89, 0); } }

    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="container">
        <h1>🎨 ปรับแต่งธีม & เอฟเฟกต์แอป</h1>

        <div class="section-title">✨ ธีมสำเร็จรูป (Quick Presets)</div>
        <div class="preset-grid">
            <button class="btn-preset preset-aggressive" onclick="applyPreset('aggressive')">🔥 ดุดัน</button>
            <button class="btn-preset preset-cool" onclick="applyPreset('cool')">🧊 เท่ ล้ำยุค</button>
            <button class="btn-preset preset-luxury" onclick="applyPreset('luxury')">👑 เรียบหรู</button>
            <button class="btn-preset preset-vibrant" onclick="applyPreset('vibrant')">🌈 สดใส</button>
            <button class="btn-preset preset-playful" onclick="applyPreset('playful')">🎉 สนุกสนาน</button>
        </div>
        
        <div class="section-title">1. 🎨 สีหลักของแอป (App Colors)</div>
        <div class="form-row">
            <label>สีพื้นหลังแอป (Background)</label>
            <input type="color" id="bgColor" value="#121418">
        </div>
        <div class="form-row">
            <label>สีหลัก/ปุ่มกด (Primary Color)</label>
            <input type="color" id="primaryColor" value="#C5A059">
        </div>

        <div class="section-title">2. 👑 กรอบ VIP & โปรโมท (VIP Settings)</div>
        <div class="form-row">
            <label>สีกรอบ VIP</label>
            <input type="color" id="vipBorderColor" value="#FFD700">
        </div>
        <div class="form-group">
            <label>ลูกเล่น/เอฟเฟกต์ การ์ด VIP (VIP Animation)</label>
            <select id="vipEffect">
                <option value="none">ไม่มีเอฟเฟกต์ (นิ่งๆ)</option>
                <option value="glow">🌟 เรืองแสงกระพริบ (Pulse Glow)</option>
                <option value="rainbow">🌈 สีรุ้งวิ่งวน (Rainbow Border)</option>
                <option value="float">🎈 ลอยขึ้นลง (Floating)</option>
                <option value="neon">💡 ขอบนีออนสว่าง (Neon Light)</option>
                <option value="shake">📳 สั่นดึงดูดสายตา (Shake)</option>
                <option value="shimmer">✨ ประกายแสงสะท้อน (Shimmer)</option>
            </select>
        </div>

        <div class="section-title">3. 🖼️ โลโก้แอป (App Logo)</div>
        <div class="form-group">
            <label>เอฟเฟกต์ของโลโก้</label>
            <select id="logoEffect">
                <option value="shine">✨ แสงวิ่งพาดผ่าน (Shine)</option>
                <option value="none">ไม่มีเอฟเฟกต์</option>
                <option value="pulse">💗 เต้นเหมือนจังหวะหัวใจ (Pulse)</option>
                <option value="spin">🌀 หมุนช้าๆ ตลอดเวลา (Spin)</option>
                <option value="bounce">🏀 กระเด้งดึ๋งๆ (Bounce)</option>
                <option value="float">☁️ ลอยเบาๆ (Float)</option>
            </select>
        </div>
        <div class="form-group">
            <label style="font-size: 13px; color: #aaa;">อัปโหลดรูปภาพโลโก้ใหม่ (เว้นว่างเพื่อใช้โลโก้ทองเริ่มต้น)</label>
            <input type="file" id="logoUpload" accept="image/*" onchange="previewLogo(event)">
        </div>

        <div class="section-title">4. 👤 รูปโปรไฟล์ลูกค้า (User Profile)</div>
        <div class="form-group">
            <label>เอฟเฟกต์รอบรูปโปรไฟล์</label>
            <select id="profileEffect">
                <option value="none">กรอบสีหลักปกติ (Default)</option>
                <option value="glow-gold">🌟 ออร่าทองเรืองแสง (Gold Aura)</option>
                <option value="rainbow-spin">🌈 กรอบสีรุ้งหมุนวน (Spinning Rainbow)</option>
                <option value="pulse-ring">🌊 วงแหวนกระจายออก (Pulse Ring)</option>
                <option value="float">🎈 ลอยเบาๆ (Floating Profile)</option>
            </select>
        </div>

        <button class="btn-save" id="btnSave" onclick="saveThemeSettings()">💾 ยืนยันและบันทึกการตั้งค่า</button>
        <button class="btn-reset" onclick="resetToDefault()">🔄 คืนค่าสีและเอฟเฟกต์ดั้งเดิม (Default)</button>
    </div>

    <div class="preview-wrapper">
        <h3 style="color: #DFBF8B; margin-top: 0; text-align: center;">📱 หน้าจอตัวอย่าง (Preview)</h3>
        <div class="preview-phone" id="preview-phone">
            <div class="phone-notch"></div>
            
            <div class="mock-header">
                <div class="mock-profile" id="preview-profile">👤</div>
                <h3 class="mock-app-name" id="preview-app-name">ไปไหนดี</h3>
            </div>
            
            <div class="mock-body">
                <div class="mock-logo-container">
                    <img id="preview-logo-img" src="data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><circle cx='100' cy='100' r='90' fill='none' stroke='%23C5A059' stroke-width='6'/><path d='M100,165 C70,135 60,115 60,95 A40,40 0 1,1 140,95 C140,115 130,135 100,165 Z' fill='%23C5A059'/></svg>" class="mock-logo-img logo-shine">
                </div>

                <div class="mock-card" id="preview-vip-card">
                    <div class="mock-card-badge" id="preview-vip-badge">👑 VIP RECOMMEND</div>
                    <div class="mock-card-img"></div>
                    <div class="mock-card-text"></div>
                    <div class="mock-card-text" style="width: 40%;"></div>
                    <button class="mock-btn" id="preview-btn-mock">📍 ดูพิกัดร้าน</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ตั้งค่า Firebase ตัวเดิมของคุณ
    const firebaseConfig = {
        apiKey: "AIzaSyBSFWKdLCjLWqzo2_mzUE95CyoiUv5TdnY",
        authDomain: "painaid-88c53.firebaseapp.com",
        projectId: "painaid-88c53",
        storageBucket: "painaid-88c53.firebasestorage.app",
        messagingSenderId: "229290700458",
        appId: "1:229290700458:web:74a57d0be5df9326c5ead3"
    };

    let db, storage;
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    db = firebase.firestore(); storage = firebase.storage();

    let currentLogoUrl = "";
    
    // ตัวแปรเก็บโลโก้ตั้งต้น (SVG ทอง)
    const defaultSvgLogo = "data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><circle cx='100' cy='100' r='90' fill='none' stroke='%23C5A059' stroke-width='6'/><path d='M100,165 C70,135 60,115 60,95 A40,40 0 1,1 140,95 C140,115 130,135 100,165 Z' fill='%23C5A059'/></svg>";

    // 🌟 ชุดข้อมูลค่าเริ่มต้น (Default Theme - เรียบหรู)
    const defaultTheme = {
        bgColor: "#121418", primaryColor: "#C5A059", vipBorderColor: "#FFD700",
        vipEffect: "shimmer", logoEffect: "shine", profileEffect: "none", logoUrl: ""
    };

    // 🌟 คลังธีมสำเร็จรูป (Presets)
    const themes = {
        aggressive: { bgColor: "#050505", primaryColor: "#D32F2F", vipBorderColor: "#FF3D00", vipEffect: "glow", logoEffect: "pulse", profileEffect: "pulse-ring" },
        cool: { bgColor: "#0A1128", primaryColor: "#00E5FF", vipBorderColor: "#D500F9", vipEffect: "neon", logoEffect: "float", profileEffect: "glow-gold" },
        luxury: { bgColor: "#121418", primaryColor: "#C5A059", vipBorderColor: "#FFD700", vipEffect: "shimmer", logoEffect: "shine", profileEffect: "none" },
        vibrant: { bgColor: "#2D1B4E", primaryColor: "#FF6B6B", vipBorderColor: "#00FF87", vipEffect: "rainbow", logoEffect: "bounce", profileEffect: "rainbow-spin" },
        playful: { bgColor: "#003B46", primaryColor: "#FF4081", vipBorderColor: "#18FFFF", vipEffect: "shake", logoEffect: "spin", profileEffect: "pulse-ring" }
    };

    // ติดตั้ง Event Listener ให้ดึงข้อมูลเมื่อเปิดหน้า และอัปเดต Preview เมื่อมีการแก้ค่า
    document.addEventListener('DOMContentLoaded', () => {
        loadCurrentSettings();
        
        // ผูก Event ให้ทุกช่องอัปเดต Preview ทันทีเมื่อมีการเปลี่ยนค่า
        const inputs = ['bgColor', 'primaryColor', 'vipBorderColor', 'vipEffect', 'logoEffect', 'profileEffect'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', updatePreviewRealtime);
        });
    });

    async function loadCurrentSettings() {
        try {
            const doc = await db.collection('painaidee').doc('themeSettings').get();
            if (doc.exists) {
                applyValuesToForm(doc.data());
            } else {
                applyValuesToForm(defaultTheme);
            }
        } catch (error) {
            console.error("Error loading settings:", error);
            applyValuesToForm(defaultTheme);
        }
    }

    function applyValuesToForm(data) {
        document.getElementById('bgColor').value = data.bgColor || defaultTheme.bgColor;
        document.getElementById('primaryColor').value = data.primaryColor || defaultTheme.primaryColor;
        document.getElementById('vipBorderColor').value = data.vipBorderColor || defaultTheme.vipBorderColor;
        
        document.getElementById('vipEffect').value = data.vipEffect || defaultTheme.vipEffect;
        document.getElementById('logoEffect').value = data.logoEffect || defaultTheme.logoEffect;
        document.getElementById('profileEffect').value = data.profileEffect || defaultTheme.profileEffect;
        
        if (data.logoUrl !== undefined) {
            currentLogoUrl = data.logoUrl;
            if(!document.getElementById('logoUpload').files[0]) {
                // ถ้ามีรูปในฐานข้อมูล และไม่ได้กำลังอัปโหลดใหม่ ให้โชว์รูปฐานข้อมูล
                document.getElementById('preview-logo-img').src = currentLogoUrl || defaultSvgLogo;
            }
        }
        updatePreviewRealtime(); // อัปเดตหน้าจอตัวอย่างทันที
    }

    function applyPreset(themeName) {
        if(themes[themeName]) {
            applyValuesToForm({ ...themes[themeName], logoUrl: currentLogoUrl });
        }
    }

    function resetToDefault() {
        if(confirm("⚠️ ยืนยันการล้างค่าสีและเอฟเฟกต์ทั้งหมด กลับไปเป็นแบบ 'เรียบหรู (Default)' ของระบบ?")) {
            applyValuesToForm(defaultTheme);
            document.getElementById('logoUpload').value = ""; 
            currentLogoUrl = "";
            document.getElementById('preview-logo-img').src = defaultSvgLogo;
            alert("คืนค่าเรียบร้อยแล้ว กรุณากด 'บันทึก' เพื่อยืนยันอีกครั้งครับ");
        }
    }

    function previewLogo(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview-logo-img').src = e.target.result;
            }
            reader.readAsDataURL(file);
        }
    }

    // 🌟 พระเอกของหน้านี้: ฟังก์ชันอัปเดตหน้าจอมือถือจำลอง 🌟
    function updatePreviewRealtime() {
        const phone = document.getElementById('preview-phone');
        const appName = document.getElementById('preview-app-name');
        const btnMock = document.getElementById('preview-btn-mock');
        const vipBadge = document.getElementById('preview-vip-badge');
        
        const vipCard = document.getElementById('preview-vip-card');
        const logoImg = document.getElementById('preview-logo-img');
        const profile = document.getElementById('preview-profile');

        const bgColor = document.getElementById('bgColor').value;
        const primaryColor = document.getElementById('primaryColor').value;
        const vipColor = document.getElementById('vipBorderColor').value;

        // อัปเดตสี
        phone.style.backgroundColor = bgColor;
        appName.style.color = primaryColor;
        btnMock.style.backgroundColor = primaryColor;
        vipBadge.style.backgroundColor = vipColor;
        
        // ส่งค่าตัวแปร CSS ไปให้ Animation ใช้
        phone.style.setProperty('--prev-primary', primaryColor);
        phone.style.setProperty('--prev-vip', vipColor);

        // อัปเดต CSS Class สำหรับ Effects
        vipCard.className = 'mock-card vip-' + document.getElementById('vipEffect').value;
        logoImg.className = 'mock-logo-img logo-' + document.getElementById('logoEffect').value;
        profile.className = 'mock-profile prof-' + document.getElementById('profileEffect').value;
    }

    // ฟังก์ชันย่อขนาดรูปก่อนอัปโหลด
    const resizeImg = (file) => new Promise((resolve) => {
        if(!file) return resolve('');
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = e => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width; let height = img.height; const max_size = 800;
                if (width > max_size || height > max_size) { if (width > height) { height = Math.round((height *= max_size / width)); width = max_size; } else { width = Math.round((width *= max_size / height)); height = max_size; } }
                canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/png', 0.9)); 
            };
            img.onerror = () => resolve('');
        };
        reader.onerror = () => resolve('');
    });

    async function saveThemeSettings() {
        const btn = document.getElementById('btnSave');
        btn.innerText = "กำลังบันทึก... ⏳";
        btn.disabled = true;

        try {
            let finalLogoUrl = currentLogoUrl;
            const logoFile = document.getElementById('logoUpload').files[0];
            
            if (logoFile) {
                btn.innerText = "กำลังอัปโหลดโลโก้... 🚀";
                const img64 = await resizeImg(logoFile);
                const ref = storage.ref(`system/${Date.now()}_logo.png`);
                await ref.putString(img64, 'data_url');
                finalLogoUrl = await ref.getDownloadURL();
            }

            const themeData = {
                bgColor: document.getElementById('bgColor').value,
                primaryColor: document.getElementById('primaryColor').value,
                vipBorderColor: document.getElementById('vipBorderColor').value,
                vipEffect: document.getElementById('vipEffect').value,
                logoEffect: document.getElementById('logoEffect').value,
                profileEffect: document.getElementById('profileEffect').value,
                logoUrl: finalLogoUrl,
                updatedAt: new Date().toLocaleString()
            };

            await db.collection('painaidee').doc('themeSettings').set(themeData);
            alert("✅ บันทึกการตั้งค่าสำเร็จ! ข้อมูลจะถูกดึงไปใช้ในแอปหลักทันที");
        } catch (error) {
            console.error(error);
            alert("❌ เกิดข้อผิดพลาดในการบันทึกข้อมูล");
        } finally {
            btn.innerText = "💾 ยืนยันและบันทึกการตั้งค่า";
            btn.disabled = false;
        }
    }
</script>
