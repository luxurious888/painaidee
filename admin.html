<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Painaidee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body{font-family:'Kanit',sans-serif;background:#121418;color:#fff}
        .input-dark{background:#2A2E36;border:1px solid #4A5568;color:#fff;border-radius:8px;padding:8px;width:100%}
        .btn{padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;transition:.2s}
        .btn-gold{background:linear-gradient(135deg,#FFD700,#C5A059);color:#000}
        .btn-green{background:#06C755;color:#fff} .btn-red{background:#D9534F;color:#fff} .btn-blue{background:#17a2b8;color:#fff}
        details{background:#1A1D23;border:1px solid rgba(197,160,89,.2);border-radius:16px;margin-bottom:20px;overflow:hidden}
        summary{padding:15px 20px;font-size:18px;font-weight:bold;color:#C5A059;cursor:pointer;outline:none;display:flex;justify-content:space-between}
        summary::after{content:'▼';color:#999;font-size:14px} details[open] summary::after{content:'▲';color:#C5A059}
        details[open] summary{border-bottom:1px solid rgba(197,160,89,.2)} .card-body{padding:20px}
        #loading{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column}
        .spin{width:50px;height:50px;border:4px solid #333;border-top-color:#C5A059;border-radius:50%;animation:sp 1s linear infinite} @keyframes sp{to{transform:rotate(360deg)}}
    </style>
</head>
<body class="p-4 md:p-8 text-sm">

<div id="loginScn" style="position:fixed;inset:0;background:#121418;z-index:999;display:flex;align-items:center;justify-content:center">
    <div class="bg-[#1A1D23] p-8 rounded-2xl border border-[#C5A059] text-center w-[90%] max-w-sm">
        <h2 class="text-xl font-bold mb-4 text-[#C5A059]">Admin Painaidee</h2>
        <input type="password" id="pwd" class="input-dark mb-4 text-center" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter') login()">
        <button class="btn btn-gold w-full" onclick="login()">เข้าสู่ระบบ</button>
    </div>
</div>

<div id="loading"><div class="spin"></div><div class="mt-4 font-bold">กำลังโหลด...</div></div>

<div class="max-w-6xl mx-auto pb-20">
    <h1 class="text-3xl font-bold text-[#C5A059] text-center mb-8">👑 Admin Dashboard</h1>

    <details open><summary>⚙️ 1. ตั้งค่าระบบ</summary><div class="card-body flex flex-wrap gap-4">
        <div class="flex-1"><label class="text-xs text-gray-400">ราคา VIP</label><input type="number" id="vPrice" class="input-dark"></div>
        <div class="flex-1"><label class="text-xs text-gray-400">บัญชีโอน</label><input type="text" id="vBank" class="input-dark"></div>
        <button class="btn btn-gold mt-5" onclick="saveSet()">💾 บันทึก</button>
    </div></details>

    <details open><summary>🆕 2. คำร้องร้านใหม่ <span id="cReg" class="bg-red-500 text-white px-2 py-0.5 rounded-full text-xs">0</span></summary>
        <div class="card-body grid grid-cols-1 md:grid-cols-2 gap-4" id="listReg"></div>
    </details>

    <details open><summary>👑 3. สลิป VIP (แถมโปรฟรี 7 วัน) <span id="cVip" class="bg-red-500 text-white px-2 py-0.5 rounded-full text-xs">0</span></summary>
        <div class="card-body grid grid-cols-1 md:grid-cols-3 gap-4" id="listVip"></div>
    </details>

    <details open><summary>🚀 4. สลิปโปรโมทแบนเนอร์ <span id="cPro" class="bg-red-500 text-white px-2 py-0.5 rounded-full text-xs">0</span></summary>
        <div class="card-body grid grid-cols-1 md:grid-cols-2 gap-4" id="listPro"></div>
    </details>

    <details><summary>✨ 5. แบนเนอร์ที่แสดงผลอยู่</summary>
        <div class="card-body grid grid-cols-1 md:grid-cols-2 gap-4" id="listActPro"></div>
    </details>

    <details><summary>🏬 6. ฐานข้อมูลร้านทั้งหมด (ส่งรหัสซ้ำ)</summary>
        <div class="card-body grid grid-cols-1 md:grid-cols-3 gap-4" id="listStore"></div>
    </details>

    <details><summary>📦 7. แพ็กเกจ & หมวดหมู่</summary>
        <div class="card-body">
            <div class="flex gap-2 mb-4"><input type="text" id="sName" class="input-dark" placeholder="ชื่อแพ็ก"><input type="number" id="sDays" class="input-dark w-24" placeholder="วัน"><button class="btn btn-green w-32" onclick="addSvc()">เพิ่มแพ็ก</button></div>
            <div id="listSvc" class="grid grid-cols-3 gap-2 mb-8"></div>
            <div class="flex gap-2 mb-4"><select id="cGroup" class="input-dark w-32"><option value="food">อาหาร</option><option value="beauty">สปา</option><option value="activity">เที่ยว</option><option value="sport">กีฬา</option></select><input type="text" id="cLabel" class="input-dark" placeholder="ชื่อ"><input type="text" id="cKey" class="input-dark" placeholder="คีย์ค้นหา"><button class="btn btn-green w-32" onclick="addCat()">เพิ่มหมวด</button></div>
            <button class="btn btn-blue mb-4" onclick="saveCats()">💾 เซฟหมวดหมู่ที่แก้</button>
            <div id="listCat" class="flex flex-col gap-2"></div>
        </div>
    </details>
</div>

<button onclick="load()" class="fixed bottom-5 right-5 btn btn-gold rounded-full shadow-lg text-lg">🔄 รีเฟรช</button>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwojqh2ry1b_xkuVp28w5q8Cs0CX9xBcI-upICxz98NtRrwnJ99GwLneWXFGQJySN1T/exec";
    let db = { registrationRequests:[], registeredStores:[], pendingPromotions:[], activePromotions:[], categories:[], services:[], pendingVipRequests:[], vipSettings:{price:500,bankAccount:'-'} };

    function login() { if(document.getElementById('pwd').value==="250899"){ sessionStorage.admin='1'; document.getElementById('loginScn').style.display='none'; load(); }else alert("รหัสผิด"); }
    if(sessionStorage.admin==='1'){ document.getElementById('loginScn').style.display='none'; load(); }

    const formatD = ms => ms ? new Date(ms - new Date().getTimezoneOffset()*60000).toISOString().slice(0,16) : '';
    const showL = s => document.getElementById('loading').style.display = s ? 'flex' : 'none';

    async function load() { showL(true); try{ const res=await fetch(API+"?t="+Date.now()); const d=await res.json(); if(d.registeredStores) db={...db,...d}; }catch(e){} render(); showL(false); }
    async function save() { showL(true); try{ await fetch(API,{method:'POST',body:JSON.stringify(db)}); render(); }catch(e){} showL(false); }

    function saveSet() { db.vipSettings.price=document.getElementById('vPrice').value; db.vipSettings.bankAccount=document.getElementById('vBank').value; save(); alert("บันทึกสำเร็จ"); }

    function render() {
        document.getElementById('vPrice').value = db.vipSettings.price||500; document.getElementById('vBank').value = db.vipSettings.bankAccount||'';

        document.getElementById('cReg').innerText = db.registrationRequests.length;
        document.getElementById('listReg').innerHTML = db.registrationRequests.map((r,i)=>`<div class="bg-[#2A2E36] p-4 rounded-lg border border-blue-500"><h3 class="font-bold text-lg">${r.storeName}</h3><p class="text-gray-400">📞 ${r.phone}</p>${r.refCode?`<p class="text-cyan-400">🤝 ผช: ${r.refCode}</p>`:''}<div class="flex gap-2 mt-3"><button class="btn btn-green flex-1" onclick="apprStore(${i})">✅ อนุมัติ & PIN</button><button class="btn btn-red" onclick="delItem('registrationRequests',${i})">❌ ลบ</button></div></div>`).join('');

        document.getElementById('cVip').innerText = db.pendingVipRequests.length;
        document.getElementById('listVip').innerHTML = db.pendingVipRequests.map((r,i)=>`<div class="bg-[#2A2E36] p-4 rounded-lg border border-yellow-500"><h3 class="font-bold text-yellow-500">${r.storeName}</h3><img src="${r.slipImage}" class="h-24 w-full object-cover mt-2 cursor-pointer" onclick="window.open('${r.slipImage}')"><div class="flex gap-2 mt-3"><button class="btn btn-green flex-1" onclick="apprVip(${i})">✅ อนุมัติ(+โปร7วัน)</button><button class="btn btn-red" onclick="delItem('pendingVipRequests',${i})">❌</button></div></div>`).join('');

        document.getElementById('cPro').innerText = db.pendingPromotions.length;
        document.getElementById('listPro').innerHTML = db.pendingPromotions.map((p,i)=>`<div class="bg-[#2A2E36] p-4 rounded-lg border ${p.isFreeRedeem?'border-purple-500':'border-cyan-500'}"><div>${p.isFreeRedeem?'<span class="bg-purple-500 text-white px-2 py-1 rounded text-xs">🎁 สิทธิ์โปรฟรี VIP</span>':(p.isUpdateOnly?'<span class="bg-yellow-500 text-black px-2 py-1 rounded text-xs">📝 แก้ข้อความ</span>':'<span class="bg-cyan-500 text-white px-2 py-1 rounded text-xs">🆕 ซื้อแพ็กเกจ</span>')}</div><div class="flex gap-2 mt-2"><img src="${p.image}" class="h-20 w-1/2 object-cover" onclick="window.open('${p.image}')">${p.slipImage?`<img src="${p.slipImage}" class="h-20 w-1/2 object-cover" onclick="window.open('${p.slipImage}')">`:''}</div><input id="epStore_${i}" class="input-dark mt-2" value="${p.storeName}"><textarea id="epDet_${i}" class="input-dark mt-2" rows="1">${p.detail}</textarea><div class="flex gap-2 mt-2"><button class="btn btn-green flex-1" onclick="apprPro(${i})">✅ อนุมัติ</button><button class="btn btn-red" onclick="delItem('pendingPromotions',${i})">❌</button></div></div>`).join('');

        document.getElementById('listActPro').innerHTML = db.activePromotions.map((p,i)=>`<div class="bg-[#2A2E36] p-4 rounded-lg border border-green-500"><img src="${p.image}" class="h-24 w-full object-cover mb-2"><input id="eaStore_${i}" class="input-dark text-yellow-500 font-bold mb-2" value="${p.storeName}"><input type="datetime-local" id="eaExp_${i}" class="input-dark mb-2" value="${formatD(p.expireTimestamp)}"><textarea id="eaDet_${i}" class="input-dark mb-2" rows="1">${p.detail}</textarea><div class="flex gap-2"><button class="btn btn-blue flex-1" onclick="saveActPro(${i})">💾 เซฟ</button><button class="btn btn-red" onclick="delItem('activePromotions',${i})">🗑️</button></div></div>`).join('');

        document.getElementById('listStore').innerHTML = db.registeredStores.map((s,i)=>`<div class="bg-[#242730] p-4 rounded-lg border ${s.isVIP?'border-yellow-500':''} relative"><h3 class="font-bold text-lg">${s.name}</h3><p class="text-yellow-500 font-mono text-lg mb-2">PIN: ${s.pin}</p><p class="text-xs text-gray-400 mb-3">โปรฟรีเหลือ: ${s.freePromoDays||0} วัน</p><button class="btn btn-blue w-full text-xs mb-2" onclick="resendPin(${i})">📨 ส่ง PIN ซ้ำทาง LINE</button>${s.isVIP?`<button class="btn btn-red w-full text-xs" onclick="togVip(${i})">ยกเลิก VIP</button>`:`<button class="btn btn-gold w-full text-xs" onclick="togVip(${i})">เปิด VIP</button>`}</div>`).join('');

        document.getElementById('listSvc').innerHTML = db.services.map((s,i)=>`<div class="bg-[#2A2E36] p-2 rounded flex justify-between"><span class="text-xs">${s.name} (${s.days||30}วัน)</span><button class="text-red-500 text-xs" onclick="delItem('services',${i})">ลบ</button></div>`).join('');
        document.getElementById('listCat').innerHTML = db.categories.map((c,i)=>`<div class="flex gap-2 items-center"><select id="ecG_${i}" class="input-dark w-24 p-1"><option value="food" ${c.group==='food'?'selected':''}>อาหาร</option><option value="beauty" ${c.group==='beauty'?'selected':''}>สปา</option><option value="activity" ${c.group==='activity'?'selected':''}>เที่ยว</option><option value="sport" ${c.group==='sport'?'selected':''}>กีฬา</option></select><input id="ecL_${i}" class="input-dark p-1" value="${c.label}"><input id="ecK_${i}" class="input-dark p-1" value="${c.keyword}"><button class="text-red-500 text-xl font-bold px-2" onclick="delItem('categories',${i})">×</button></div>`).join('');
    }

    async function apprStore(i) {
        let r = db.registrationRequests[i]; let pin = prompt(`ตั้งรหัส 6 หลักให้ร้าน: ${r.storeName}\n(กดยืนยันเพื่อใช้รหัสสุ่ม)`, Math.floor(100000+Math.random()*900000));
        if(!pin) return; const ns = {name:r.storeName, pin:pin.trim(), userId:r.userId, phone:r.phone, refCode:r.refCode||'', isVIP:false, freePromoDays:0};
        db.registeredStores.unshift(ns); db.registrationRequests.splice(i,1); showL(true); await fetch(API,{method:'POST',body:JSON.stringify(db)});
        if(ns.userId) { try{ await fetch(API,{method:'POST',body:JSON.stringify({action:"SEND_LINE_PIN",targetUserId:ns.userId,message:`✅ อนุมัติร้าน ${ns.name}\n🔑 รหัส PIN: ${ns.pin}`})}); alert("ส่ง PIN เข้า LINE สำเร็จ"); }catch(e){} }
        else prompt("ส่งรหัสให้ลูกค้า:", ns.pin); load();
    }

    async function resendPin(i) {
        const st = db.registeredStores[i]; if(st.userId) { showL(true); try{ await fetch(API,{method:'POST',body:JSON.stringify({action:"SEND_LINE_PIN",targetUserId:st.userId,message:`🔑 รหัส PIN ของร้าน ${st.name} คือ: ${st.pin}`})}); alert("ส่ง PIN ทาง LINE สำเร็จ"); }catch(e){} showL(false); } else prompt("ก๊อปปี้ PIN ให้ลูกค้า:", st.pin);
    }

    function apprVip(i) { const r = db.pendingVipRequests[i]; const st = db.registeredStores.find(s=>s.name===r.storeName); if(st) { st.isVIP=true; st.vipExpireTimestamp=Date.now()+(30*86400000); st.freePromoDays=7; db.pendingVipRequests.splice(i,1); save(); alert(`อนุมัติ VIP และแถมโปรฟรี 7 วันให้ร้าน ${st.name} แล้ว!`); } }

    function apprPro(i) {
        let p = db.pendingPromotions[i]; p.storeName=document.getElementById(`epStore_${i}`).value; p.detail=document.getElementById(`epDet_${i}`).value;
        const exIdx = db.activePromotions.findIndex(a=>a.storeName===p.storeName);
        if(p.isUpdateOnly && exIdx !== -1) { db.activePromotions[exIdx].detail=p.detail; db.activePromotions[exIdx].image=p.image; alert("อัปเดตแบนเนอร์สำเร็จ"); }
        else { const addDays = p.isFreeRedeem ? 7 : 30; p.expireTimestamp=Date.now()+(addDays*86400000); db.activePromotions.unshift(p); alert(`อนุมัติแสดงผล ${addDays} วันสำเร็จ!`); }
        db.pendingPromotions.splice(i,1); save();
    }

    function saveActPro(i) { let p=db.activePromotions[i]; p.storeName=document.getElementById(`eaStore_${i}`).value; p.detail=document.getElementById(`eaDet_${i}`).value; const exp=document.getElementById(`eaExp_${i}`).value; if(exp) p.expireTimestamp=new Date(exp).getTime(); save(); alert("แก้ไขแบนเนอร์สำเร็จ"); }
    function togVip(i) { let s=db.registeredStores[i]; s.isVIP=!s.isVIP; if(s.isVIP){ s.vipExpireTimestamp=Date.now()+(30*86400000); s.freePromoDays=7; } save(); }
    function delItem(arr,i) { if(confirm('ยืนยันลบ?')) { db[arr].splice(i,1); save(); } }
    function addSvc() { db.services.push({name:document.getElementById('sName').value, price:0, days:parseInt(document.getElementById('sDays').value)||30}); save(); }
    function addCat() { db.categories.push({group:document.getElementById('cGroup').value,label:document.getElementById('cLabel').value,keyword:document.getElementById('cKey').value}); save(); }
    function saveCats() { db.categories.forEach((c,i)=>{c.group=document.getElementById(`ecG_${i}`).value; c.label=document.getElementById(`ecL_${i}`).value; c.keyword=document.getElementById(`ecK_${i}`).value;}); save(); alert("เซฟหมวดหมู่สำเร็จ"); }
</script>
</body>
</html>
