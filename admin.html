<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการแอดมิน - ไปไหนดี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #121418; color: #fff; }
        .card { background: #1A1D23; border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .gold-text { color: #C5A059; }
        .btn-approve { background: linear-gradient(135deg, #06C755, #05A044); color: white; padding: 8px 16px; border-radius: 8px; font-weight: 500; transition: 0.3s; }
        .btn-approve:hover { filter: brightness(1.1); }
        .btn-reject { background: #dc3545; color: white; padding: 8px 16px; border-radius: 8px; font-weight: 500; transition: 0.3s; }
        .btn-reject:hover { filter: brightness(1.1); }
        .vip-badge { background: linear-gradient(135deg, #FFD700, #C5A059); color: #000; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold gold-text mb-8 text-center border-b border-gray-700 pb-4">👑 แผงควบคุมแอดมิน (Admin Panel)</h1>

        <section class="mb-10">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                🆕 1. คำร้องลงทะเบียนร้านใหม่ 
                <span id="reg-count" class="bg-red-500 text-white text-xs px-3 py-1 rounded-full">0</span>
            </h2>
            <div id="registration-list" class="space-y-4">
                <p class="text-gray-500 italic">กำลังโหลดข้อมูล...</p>
            </div>
        </section>

        <section class="mb-10">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                💎 2. ตรวจสอบสลิปสมัคร VIP 
                <span id="vip-req-count" class="bg-yellow-500 text-black text-xs px-3 py-1 rounded-full">0</span>
            </h2>
            <div id="vip-request-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-500 italic">ไม่มีรายการรออนุมัติ</p>
            </div>
        </section>

        <section class="mb-10">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                🚀 3. อัปเดตแบนเนอร์โปรโมชั่น 
                <span id="promo-count" class="bg-blue-500 text-white text-xs px-3 py-1 rounded-full">0</span>
            </h2>
            <div id="pending-promo-list" class="space-y-4">
                <p class="text-gray-500 italic">ไม่มีรายการรออนุมัติ</p>
            </div>
        </section>

        <section>
            <h2 class="text-xl font-semibold mb-4">🏠 4. ฐานข้อมูลร้านค้าทั้งหมด</h2>
            <div id="store-management-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
    </div>

    <script>
        // ⚡ ลิงก์ API ต้องตรงกับหน้า index.html
        const API_URL = "https://script.google.com/macros/s/AKfycbzdha6RwLDH1aYfxazAXPZ5Bvh5uTxAWN8TqoFKS05747T58M6jsSV-6OvOWGZNkq4/exec";

        let appData = { registrationRequests: [], registeredStores: [], pendingPromotions: [], activePromotions: [], pendingVipRequests: [] };

        async function loadData() {
            try {
                document.getElementById('registration-list').innerHTML = '<p class="text-gray-500 italic">กำลังเชื่อมต่อฐานข้อมูล...</p>';
                const res = await fetch(API_URL + "?t=" + Date.now());
                const data = await res.json();
                appData = { ...appData, ...data };
                
                // เช็คค่าว่างป้องกัน Error
                if (!appData.registrationRequests) appData.registrationRequests = [];
                if (!appData.registeredStores) appData.registeredStores = [];
                if (!appData.pendingPromotions) appData.pendingPromotions = [];
                if (!appData.activePromotions) appData.activePromotions = [];
                if (!appData.pendingVipRequests) appData.pendingVipRequests = [];

                renderAll();
            } catch (e) { 
                console.error("Load error", e); 
                alert("โหลดข้อมูลไม่สำเร็จ กรุณารีเฟรชหน้าเว็บ");
            }
        }

        async function saveData() {
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(appData) });
                alert("บันทึกข้อมูลเรียบร้อย!");
                loadData();
            } catch (e) { alert("เกิดข้อผิดพลาดในการบันทึก"); }
        }

        function renderAll() {
            renderRegistrations();
            renderVipRequests();
            renderPendingPromos();
            renderStores();
        }

        // --- 1. แสดงรายการลงทะเบียนใหม่ ---
        function renderRegistrations() {
            const list = document.getElementById('registration-list');
            const requests = appData.registrationRequests;
            document.getElementById('reg-count').innerText = requests.length;

            if (requests.length === 0) { list.innerHTML = `<p class="text-gray-500 italic">✅ ไม่มีคำร้องใหม่</p>`; return; }

            list.innerHTML = requests.map((req, index) => `
                <div class="card border-l-4 border-blue-500">
                    <div class="flex flex-col md:flex-row justify-between items-start gap-4">
                        <div class="flex-1">
                            <h3 class="font-bold text-xl gold-text">${req.storeName}</h3>
                            <p class="text-sm mt-1">📞 เบอร์โทร: <span class="text-white">${req.phone}</span></p>
                            <p class="text-xs text-gray-400 mt-1">เวลาส่งเรื่อง: ${new Date(req.id).toLocaleString()}</p>
                            <div class="flex flex-wrap gap-2 mt-3">
                                <a href="${req.storePhoto}" target="_blank" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded">🖼️ รูปร้าน</a>
                                <a href="${req.idCard}" target="_blank" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded">🪪 บัตร ปชช.</a>
                                ${req.commercial ? `<a href="${req.commercial}" target="_blank" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded">📄 ทะเบียนพาณิชย์</a>` : ''}
                            </div>
                        </div>
                        <div class="flex md:flex-col gap-2 w-full md:w-auto">
                            <button onclick="approveStore(${index})" class="btn-approve text-sm w-full md:w-auto">✅ อนุมัติ & ออก PIN</button>
                            <button onclick="rejectRegistration(${index})" class="btn-reject text-sm w-full md:w-auto">❌ ปฏิเสธ/ลบ</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function approveStore(index) {
            const req = appData.registrationRequests[index];
            const pin = Math.floor(1000 + Math.random() * 9000).toString(); // สุ่ม PIN 4 หลัก
            
            appData.registeredStores.push({
                name: req.storeName,
                phone: req.phone,
                pin: pin,
                isVIP: false,
                lineUrl: '',
                fbUrl: ''
            });
            
            appData.registrationRequests.splice(index, 1);
            
            // แจ้งเตือนแอดมินเพื่อก๊อปปี้ส่งให้ลูกค้า
            prompt(`อนุมัติร้าน "${req.storeName}" สำเร็จ!\n\nรหัส PIN ของร้านนี้คือ:`, pin);
            saveData();
        }

        // --- 2. ตรวจสอบสลิป VIP ---
        function renderVipRequests() {
            const list = document.getElementById('vip-request-list');
            const requests = appData.pendingVipRequests;
            document.getElementById('vip-req-count').innerText = requests.length;

            if (requests.length === 0) { list.innerHTML = `<p class="text-gray-500 italic col-span-2">✅ ไม่มีสลิปรอตรวจสอบ</p>`; return; }

            list.innerHTML = requests.map((req, index) => `
                <div class="card border-t-4 border-yellow-500">
                    <h3 class="font-bold text-lg gold-text mb-2">👑 ${req.storeName}</h3>
                    <p class="text-xs text-gray-400 mb-3">ส่งเมื่อ: ${req.requestDate}</p>
                    <img src="${req.slipImage}" class="w-full h-48 object-contain bg-black rounded mb-4 cursor-pointer" onclick="window.open('${req.slipImage}')" title="คลิกเพื่อดูรูปใหญ่">
                    <div class="flex gap-2">
                        <button onclick="approveVip(${index})" class="btn-approve flex-1 text-sm">✅ อนุมัติ VIP</button>
                        <button onclick="rejectVip(${index})" class="btn-reject flex-1 text-sm">❌ สลิปไม่ผ่าน</button>
                    </div>
                </div>
            `).join('');
        }

        function approveVip(index) {
            const req = appData.pendingVipRequests[index];
            const store = appData.registeredStores.find(s => s.name === req.storeName);
            
            if (store) {
                store.isVIP = true;
                // ตั้งเวลาหมดอายุ VIP (ตัวอย่าง: ให้ 30 วันนับจากที่อนุมัติ)
                store.vipExpireTimestamp = Date.now() + (30 * 24 * 60 * 60 * 1000); 
                alert(`เปิดสถานะ VIP ให้ร้าน ${req.storeName} สำเร็จ!`);
            } else {
                alert("ไม่พบข้อมูลร้านค้านี้ในระบบ");
            }
            
            appData.pendingVipRequests.splice(index, 1);
            saveData();
        }

        // --- 3. แสดงรายการรออนุมัติโปรโมชั่นหน้าแรก ---
        function renderPendingPromos() {
            const list = document.getElementById('pending-promo-list');
            const promos = appData.pendingPromotions;
            document.getElementById('promo-count').innerText = promos.length;

            if (promos.length === 0) { list.innerHTML = `<p class="text-gray-500 italic">✅ ไม่มีแบนเนอร์รออนุมัติ</p>`; return; }

            list.innerHTML = promos.map((p, index) => `
                <div class="card border-l-4 border-purple-500">
                    <div class="flex flex-col md:flex-row justify-between items-start gap-4">
                        <div class="flex-1 w-full">
                            <h3 class="font-bold gold-text text-lg">${p.storeName}</h3>
                            <p class="text-sm text-gray-300 mt-1">📍 จังหวัด: ${p.province} | 🏷️ หมวด: ${p.category}</p>
                            <p class="text-sm text-gray-400 mt-1">💎 แพ็กเกจ: ${p.service}</p>
                            <div class="bg-gray-800 p-2 rounded mt-2 text-sm">${p.detail}</div>
                        </div>
                        <img src="${p.image}" class="w-full md:w-48 h-32 object-cover rounded shadow border border-gray-600">
                        <div class="flex md:flex-col gap-2 w-full md:w-auto mt-2 md:mt-0">
                            <button onclick="approvePromo(${index})" class="btn-approve text-sm w-full md:w-auto">✅ ขึ้นหน้าแรก</button>
                            <button onclick="rejectPromo(${index})" class="btn-reject text-sm w-full md:w-auto">❌ ลบทิ้ง</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function approvePromo(index) {
            const p = appData.pendingPromotions[index];
            
            // ลบโปรเดิมของร้านนี้ออกก่อน (ถ้าร้านอัปเดตใหม่)
            appData.activePromotions = appData.activePromotions.filter(item => item.storeName !== p.storeName);
            
            // เพิ่มเข้าไปใน active
            appData.activePromotions.push(p);
            appData.pendingPromotions.splice(index, 1);
            
            alert(`นำโปรโมชั่นร้าน ${p.storeName} ขึ้นหน้าแรกสำเร็จ!`);
            saveData();
        }

        // --- 4. แสดงรายชื่อร้านค้าทั้งหมดในระบบ ---
        function renderStores() {
            const list = document.getElementById('store-management-list');
            const stores = appData.registeredStores;
            
            list.innerHTML = stores.map((s, index) => `
                <div class="card text-sm relative overflow-hidden ${s.isVIP ? 'border-yellow-500' : 'border-gray-700'}">
                    ${s.isVIP ? '<div class="absolute top-2 right-2 vip-badge">VIP</div>' : ''}
                    <div class="mb-2">
                        <span class="font-bold text-lg text-white">${s.name}</span>
                    </div>
                    <div class="bg-gray-800 p-2 rounded flex justify-between items-center mb-3">
                        <span class="text-gray-400">🔑 รหัส PIN:</span>
                        <span class="text-blue-400 font-bold text-lg">${s.pin}</span>
                    </div>
                    <p class="text-gray-400 mb-1">📞 โทร: <span class="text-white">${s.phone}</span></p>
                    
                    <hr class="border-gray-700 my-3">
                    
                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-yellow-500" ${s.isVIP ? 'checked' : ''} onchange="toggleVip(${index}, this.checked)"> 
                            <span class="${s.isVIP ? 'gold-text font-bold' : 'text-gray-400'}">สถานะ VIP</span>
                        </label>
                        <button onclick="deleteStore(${index}, '${s.name}')" class="text-red-500 hover:text-red-400 text-xs underline">ลบร้านนี้</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleVip(index, isChecked) {
            appData.registeredStores[index].isVIP = isChecked;
            if(isChecked) {
                appData.registeredStores[index].vipExpireTimestamp = Date.now() + (30 * 24 * 60 * 60 * 1000); // 30 วัน
            }
            saveData();
        }

        // --- ฟังก์ชันลบคำร้องต่างๆ ---
        function rejectRegistration(index) { 
            if(confirm('ยืนยันการลบคำร้องลงทะเบียนนี้? (ข้อมูลจะหายไป)')) { 
                appData.registrationRequests.splice(index, 1); saveData(); 
            } 
        }
        
        function rejectVip(index) { 
            if(confirm('ยืนยันว่าสลิปไม่ผ่าน และต้องการลบคำร้อง VIP นี้?')) { 
                appData.pendingVipRequests.splice(index, 1); saveData(); 
            } 
        }

        function rejectPromo(index) { 
            if(confirm('ยืนยันการลบโปรโมชั่นนี้?')) { 
                appData.pendingPromotions.splice(index, 1); saveData(); 
            } 
        }

        function deleteStore(index, name) {
            if(confirm(`⚠️ คำเตือน: คุณแน่ใจหรือไม่ที่จะลบร้าน "${name}" ออกจากระบบอย่างถาวร?`)) {
                appData.registeredStores.splice(index, 1);
                // ลบโปรโมชั่นที่เกี่ยวข้องออกด้วย
                appData.activePromotions = appData.activePromotions.filter(p => p.storeName !== name);
                saveData();
            }
        }

        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        window.onload = loadData;
    </script>
</body>
</html>
