<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painaidee - Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #C5A059; text-align: center; background: #121418; padding: 20px; border-radius: 12px; margin-top: 0; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card h2 { margin-top: 0; color: #121418; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        th { background-color: #f9f9f9; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Kanit'; font-weight: 500; color: #fff; }
        .btn-approve { background-color: #06C755; }
        .btn-delete { background-color: #D9534F; }
        .btn-vip { background-color: #FFD700; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 ระบบจัดการหลังบ้าน (Admin)</h1>

    <div class="card">
        <h2>1. คำขอลงทะเบียนร้านค้าใหม่</h2>
        <table id="reqTable">
            <tr><th>ชื่อร้าน</th><th>รูปภาพ</th><th>จัดการ</th></tr>
        </table>
    </div>

    <div class="card">
        <h2>2. ร้านค้าในระบบ (จัดการ PIN / VIP)</h2>
        <table id="storeTable">
            <tr><th>ชื่อร้าน</th><th>PIN</th><th>สถานะ VIP</th><th>จัดการ</th></tr>
        </table>
    </div>

    <div class="card">
        <h2>3. คำขอขึ้นป้ายโปรโมทแบนเนอร์</h2>
        <table id="promoTable">
            <tr><th>ชื่อร้าน</th><th>รายละเอียด</th><th>หมวดหมู่</th><th>จัดการ</th></tr>
        </table>
    </div>
</div>

<script>
    // เชื่อมต่อฐานข้อมูลเดียวกันกับหน้าเว็บหลัก
    let appData = JSON.parse(localStorage.getItem('painaidee_auth')) || { registrationRequests: [], registeredStores: [], pendingPromotions: [], activePromotions: [] };
    function saveData() { localStorage.setItem('painaidee_auth', JSON.stringify(appData)); loadAdminData(); }

    function loadAdminData() {
        // 1. โหลดคำขอลงทะเบียน
        const reqTable = document.getElementById('reqTable');
        reqTable.innerHTML = '<tr><th>ชื่อร้าน</th><th>รูปภาพ</th><th>จัดการ</th></tr>' + 
            appData.registrationRequests.map((r, index) => `
            <tr>
                <td>${r.storeName}</td>
                <td><img src="${r.storePhoto}" height="50"></td>
                <td>
                    <button class="btn btn-approve" onclick="approveStore(${index})">สร้างรหัส PIN</button>
                    <button class="btn btn-delete" onclick="deleteReq(${index})">ลบ</button>
                </td>
            </tr>`).join('');

        // 2. โหลดร้านค้าในระบบ
        const storeTable = document.getElementById('storeTable');
        storeTable.innerHTML = '<tr><th>ชื่อร้าน</th><th>PIN</th><th>สถานะ VIP</th><th>จัดการ</th></tr>' + 
            appData.registeredStores.map((s, index) => `
            <tr>
                <td>${s.name}</td>
                <td><strong>${s.pin}</strong></td>
                <td>${s.isVIP ? '👑 VIP' : 'ทั่วไป'}</td>
                <td>
                    <button class="btn btn-vip" onclick="toggleVIP(${index})">สลับ VIP</button>
                    <button class="btn btn-delete" onclick="deleteStore(${index})">ลบ</button>
                </td>
            </tr>`).join('');

        // 3. โหลดคำขอโปรโมท
        const promoTable = document.getElementById('promoTable');
        promoTable.innerHTML = '<tr><th>ชื่อร้าน</th><th>รายละเอียด</th><th>แพ็กเกจ</th><th>จัดการ</th></tr>' + 
            appData.pendingPromotions.map((p, index) => `
            <tr>
                <td>${p.storeName}</td>
                <td>${p.detail}</td>
                <td>${p.service || '-'}</td>
                <td>
                    <button class="btn btn-approve" onclick="approvePromo(${index})">อนุมัติขึ้นป้าย</button>
                    <button class="btn btn-delete" onclick="deletePromo(${index})">ลบ</button>
                </td>
            </tr>`).join('');
    }

    // ฟังก์ชันจัดการต่างๆ
    function approveStore(index) {
        const req = appData.registrationRequests[index];
        const newPin = Math.floor(1000 + Math.random() * 9000).toString(); // สุ่ม PIN 4 หลัก
        appData.registeredStores.push({ name: req.storeName, pin: newPin, isVIP: false });
        appData.registrationRequests.splice(index, 1);
        saveData(); alert(`อนุมัติร้าน ${req.storeName} สำเร็จ!\nรหัส PIN คือ: ${newPin}`);
    }
    function deleteReq(index) { if(confirm('แน่ใจที่จะลบคำขอนี้?')) { appData.registrationRequests.splice(index, 1); saveData(); } }
    
    function toggleVIP(index) { appData.registeredStores[index].isVIP = !appData.registeredStores[index].isVIP; saveData(); }
    function deleteStore(index) { if(confirm('ลบร้านค้านี้ออกจากระบบ?')) { appData.registeredStores.splice(index, 1); saveData(); } }

    function approvePromo(index) {
        const promo = appData.pendingPromotions[index];
        // ตรวจสอบว่าแบนเนอร์ของร้านนี้มีอยู่แล้วหรือไม่ ถ้ามีให้ต่อเวลา
        const existingPromo = appData.activePromotions.find(p => p.storeName === promo.storeName);
        const duration = 30 * 24 * 60 * 60 * 1000; // 30 วัน
        
        if (existingPromo) {
            existingPromo.expireTimestamp = Math.max(existingPromo.expireTimestamp, Date.now()) + duration;
            existingPromo.image = promo.image; existingPromo.detail = promo.detail;
        } else {
            promo.expireTimestamp = Date.now() + duration;
            appData.activePromotions.push(promo);
        }
        appData.pendingPromotions.splice(index, 1);
        saveData(); alert("อนุมัติโปรโมชั่นขึ้นป้ายสำเร็จ!");
    }
    function deletePromo(index) { if(confirm('ลบคำขอโปรโมชั่นนี้?')) { appData.pendingPromotions.splice(index, 1); saveData(); } }

    window.onload = loadAdminData;
</script>
</body>
</html>
